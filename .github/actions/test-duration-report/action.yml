name: Test Duration Report
description: Analyze JUnit test durations and summarize slow tests.

inputs:
  junit-path:
    description: Path to JUnit XML report generated by CTest
    required: true
  report-json-path:
    description: Where to write computed timing report JSON
    required: false
    default: test-duration-report.json
  top-n:
    description: Number of slowest tests to include in summary
    required: false
    default: '20'
  slow-threshold-seconds:
    description: Warn when a test exceeds this absolute duration
    required: false
    default: '60'

outputs:
  slow-count:
    description: Number of tests over the absolute slow threshold
    value: ${{ steps.analyze.outputs.slow_count }}

runs:
  using: composite
  steps:
    - name: Analyze test durations
      id: analyze
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/test_duration_report.py" \
          --junit-path "${INPUTS_JUNIT_PATH}" \
          --report-json-path "${INPUTS_REPORT_JSON_PATH}" \
          --top-n "${INPUTS_TOP_N}" \
          --slow-threshold-seconds "${INPUTS_SLOW_THRESHOLD_SECONDS}"
      env:
        INPUTS_JUNIT_PATH: ${{ inputs.junit-path }}
        INPUTS_REPORT_JSON_PATH: ${{ inputs.report-json-path }}
        INPUTS_TOP_N: ${{ inputs.top-n }}
        INPUTS_SLOW_THRESHOLD_SECONDS: ${{ inputs.slow-threshold-seconds }}
