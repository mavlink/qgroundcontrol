name: Source SBOM
description: >-
  Generate a source-tree SBOM (SPDX or CycloneDX) and upload it as a release
  artifact. Pin point for anchore/sbom-action so the two release formats stay
  on the same version.

inputs:
  format:
    description: "SBOM format: spdx-json or cyclonedx-json"
    required: true
  output-file:
    description: SBOM file path written by the generator
    required: true
  artifact-name:
    description: Upload artifact name
    required: true
  path:
    description: Source path to scan
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - uses: anchore/sbom-action@v0
      with:
        path: ${{ inputs.path }}
        format: ${{ inputs.format }}
        output-file: ${{ inputs.output-file }}
        artifact-name: ${{ inputs.artifact-name }}
