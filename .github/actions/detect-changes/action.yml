name: Detect Changes
description: Detect source, test, and CI changes for a platform

inputs:
  platform:
    description: "Platform (linux, windows, macos, android, ios, docker-linux, docker-android)"
    required: true

outputs:
  any:
    description: "Any relevant files changed"
    value: ${{ steps.check.outputs.any }}

runs:
  using: composite
  steps:
    - name: Check for changes
      id: check
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
        MERGE_BASE_SHA: ${{ github.event.merge_group.base_sha || '' }}
        CURRENT_SHA: ${{ github.sha }}
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/detect_changes.py" --platform "${{ inputs.platform }}"
