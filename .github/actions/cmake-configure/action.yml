name: CMake Configure
description: Configure QGroundControl from a repository CMake preset

inputs:
  preset:
    description: 'Configure preset from the repository CMakePresets.json'
    required: true
  build-dir:
    description: 'Build directory'
    required: false
    default: 'build'
  source-dir:
    description: 'Source directory'
    required: false
    default: ${{ github.workspace }}
  generator:
    description: 'Optional generator override for exceptional builds such as signed iOS archives'
    required: false
    default: ''
  stable:
    description: >-
      Stable build (QGC_STABLE_BUILD). Defaults to true on tag refs and Stable* branches.
    required: false
    default: ${{ (github.ref_type == 'tag' || contains(github.ref, 'Stable')) && 'true' || 'false' }}
  extra-args:
    description: 'Additional CMake arguments'
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Create build directory
      shell: bash
      env:
        INPUT_BUILD_DIR: ${{ inputs.build-dir }}
      run: mkdir -p "${INPUT_BUILD_DIR}"

    - name: Configure
      shell: bash
      run: |
        # Pin Python3_EXECUTABLE to the workspace venv so CMake-invoked jinja generators see project deps.
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          VENV_PYTHON="${GITHUB_WORKSPACE}/.venv/Scripts/python.exe"
        else
          VENV_PYTHON="${GITHUB_WORKSPACE}/.venv/bin/python"
        fi
        EXTRA_ARGS="${INPUTS_EXTRA_ARGS}"
        if [[ -x "$VENV_PYTHON" ]]; then
          EXTRA_ARGS="${EXTRA_ARGS:+$EXTRA_ARGS }-DPython3_EXECUTABLE=${VENV_PYTHON}"
        else
          echo "::warning::venv python not found at $VENV_PYTHON; CMake will pick system python (may lack jinja2)"
        fi
        ARGS=(configure
          --source-dir "${INPUTS_SOURCE_DIR}"
          --build-dir "${INPUTS_BUILD_DIR}"
          --preset "${INPUTS_PRESET}"
        )
        [[ -n "${INPUTS_GENERATOR}" ]] && ARGS+=(--generator "${INPUTS_GENERATOR}")
        [[ "${INPUTS_STABLE}" == "true" ]] && ARGS+=(--stable)
        [[ -n "$EXTRA_ARGS" ]] && ARGS+=("--extra-args=$EXTRA_ARGS")
        python3 "${GITHUB_WORKSPACE}/.github/scripts/cmake_helper.py" "${ARGS[@]}"
      env:
        INPUTS_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUTS_SOURCE_DIR: ${{ inputs.source-dir }}
        INPUTS_BUILD_DIR: ${{ inputs.build-dir }}
        INPUTS_PRESET: ${{ inputs.preset }}
        INPUTS_GENERATOR: ${{ inputs.generator }}
        INPUTS_STABLE: ${{ inputs.stable }}
