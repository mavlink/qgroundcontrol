name: Run Unit Tests
description: Run unit tests via CTest and generate standardized test artifacts.

inputs:
  build-dir:
    description: Path to CMake build directory
    required: true
  junit-output:
    description: JUnit XML output filename
    required: false
    default: junit-results.xml
  ctest-output:
    description: Captured CTest stdout/stderr filename
    required: false
    default: test-output.txt
  include-labels:
    description: CTest labels regex to include
    required: false
    default: Unit
  exclude-labels:
    description: CTest labels regex to exclude
    required: false
    default: 'Flaky|Network'
  parallel:
    description: Number of parallel CTest jobs, or 'auto'
    required: false
    default: auto
  shard-index:
    description: 'Current shard index (1-based). Leave empty to run all tests.'
    required: false
    default: ''
  shard-count:
    description: 'Total number of shards. Leave empty to run all tests.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Detect parallel jobs
      id: jobs
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/cmake_helper.py" detect-jobs \
          --parallel "${{ inputs.parallel }}"

    - name: Run CTest
      shell: bash
      working-directory: ${{ inputs.build-dir }}
      env:
        SHARD_INDEX: ${{ inputs.shard-index }}
        SHARD_COUNT: ${{ inputs.shard-count }}
      run: |
        shard_args=""
        if [[ -n "$SHARD_INDEX" && -n "$SHARD_COUNT" ]]; then
          [[ "$SHARD_INDEX" =~ ^[0-9]+$ ]] || { echo "::error::shard-index must be numeric"; exit 1; }
          [[ "$SHARD_COUNT" =~ ^[0-9]+$ ]] || { echo "::error::shard-count must be numeric"; exit 1; }
          shard_args="--shard-index $SHARD_INDEX --shard-count $SHARD_COUNT"
        fi
        python3 "${GITHUB_WORKSPACE}/.github/scripts/cmake_helper.py" ctest \
          --junit-output "${{ inputs.junit-output }}" \
          --ctest-output "${{ inputs.ctest-output }}" \
          --jobs "${{ steps.jobs.outputs.jobs }}" \
          --include-labels "${{ inputs.include-labels }}" \
          --exclude-labels "${{ inputs.exclude-labels }}" \
          $shard_args
