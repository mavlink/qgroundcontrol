name: Common Setup
description: Common Setup for All Runners
runs:
  using: composite
  steps:
    - name: Free Disk Space
      if: runner.os == 'Linux'
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: false
        large-packages: false

    - uses: lukka/get-cmake@v4.2.1
      with:
        # Pin to CMake 3.31.x - CMake 4.x has breaking changes for Apple platforms
        # that cause x86_64h architecture detection issues on ARM runners
        cmakeVersion: 3.31.6

    - uses: actions/setup-python@v6
      with:
        python-version: '>=3.9'

    - name: Create build directory
      shell: bash
      run: mkdir -p "$RUNNER_TEMP/build"
