name: GStreamer Build
description: Build, verify, and upload GStreamer for any platform

inputs:
  platform:
    description: 'Target platform (linux, macos, windows, android, ios)'
    required: true
  arch:
    description: 'Architecture'
    required: true
  version:
    description: 'GStreamer version (empty for default from build-config.json)'
    required: false
    default: ''
  build-type:
    description: 'Build type (release or debug)'
    required: false
    default: 'release'
  simulator:
    description: 'iOS simulator build'
    required: false
    default: 'false'
  upload-s3:
    description: 'Upload to S3'
    required: false
    default: 'true'
  aws-access-key-id:
    description: 'AWS access key ID'
    required: false
  aws-secret-access-key:
    description: 'AWS secret access key'
    required: false

outputs:
  version:
    description: 'GStreamer version that was built'
    value: ${{ steps.config.outputs.version }}
  archive-name:
    description: 'Archive filename'
    value: ${{ steps.archive.outputs.name }}
  archive-path:
    description: 'Full path to archive'
    value: ${{ steps.archive.outputs.path }}

runs:
  using: composite
  steps:
    - name: Read build config
      id: config
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_PLATFORM: ${{ inputs.platform }}
        INPUT_ARCH: ${{ inputs.arch }}
      run: |
        version="${INPUT_VERSION}"
        if [[ -z "$version" ]]; then
          version=$(./tools/setup/read-config.sh --get gstreamer_version)
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "qt_version=$(./tools/setup/read-config.sh --get qt_version)" >> "$GITHUB_OUTPUT"
        echo "Building GStreamer $version for ${INPUT_PLATFORM} (${INPUT_ARCH})"

    # ===== DEPENDENCIES =====

    - name: Install dependencies (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential pkg-config git \
          libx11-dev libxext-dev libxv-dev \
          libwayland-dev wayland-protocols \
          libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
          libdrm-dev libgbm-dev \
          libasound2-dev libpulse-dev \
          libva-dev nasm yasm

    - name: Install dependencies (macOS)
      if: inputs.platform == 'macos' || inputs.platform == 'ios'
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 5
        max_attempts: 3
        command: brew install pkg-config gettext

    - name: Install dependencies (Android)
      if: inputs.platform == 'android'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip git autoconf automake libtool \
          pkg-config gettext bison flex cmake ninja-build

    # ===== QT (for qml6 plugin) =====

    - name: Install Qt (Linux)
      if: inputs.platform == 'linux'
      uses: ./.github/actions/qt-install
      with:
        version: ${{ steps.config.outputs.qt_version }}
        host: linux
        target: desktop
        arch: ${{ inputs.arch == 'aarch64' && 'linux_gcc_arm64' || 'linux_gcc_64' }}

    - name: Install Qt (macOS)
      if: inputs.platform == 'macos'
      uses: ./.github/actions/qt-install
      with:
        version: ${{ steps.config.outputs.qt_version }}
        host: mac
        target: desktop
        arch: clang_64

    - name: Install Qt (Windows)
      if: inputs.platform == 'windows'
      uses: ./.github/actions/qt-install
      with:
        version: ${{ steps.config.outputs.qt_version }}
        host: windows
        target: desktop
        arch: ${{ inputs.arch == 'arm64' && 'win64_msvc2022_arm64' || 'win64_msvc2022_64' }}

    # ===== PYTHON (for meson) =====

    - name: Setup Python
      if: inputs.platform == 'linux' || inputs.platform == 'macos' || inputs.platform == 'windows'
      uses: ./.github/actions/setup-python
      with:
        groups: ci

    # ===== BUILD =====

    - name: Build GStreamer (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      env:
        VERSION: ${{ steps.config.outputs.version }}
        BUILD_TYPE: ${{ inputs.build-type }}
        PREFIX: ${{ runner.temp }}/gstreamer
      run: |
        ./tools/setup/gstreamer/build-gstreamer-linux.sh \
          --version "$VERSION" \
          --type "$BUILD_TYPE" \
          --prefix "$PREFIX" \
          --clean

    - name: Build GStreamer (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      env:
        VERSION: ${{ steps.config.outputs.version }}
        ARCH: ${{ inputs.arch }}
        BUILD_TYPE: ${{ inputs.build-type }}
        PREFIX: ${{ runner.temp }}/gstreamer
      run: |
        ./tools/setup/gstreamer/build-gstreamer-macos.sh \
          --version "$VERSION" \
          --arch "$ARCH" \
          --type "$BUILD_TYPE" \
          --prefix "$PREFIX" \
          --qt-prefix "$QT_ROOT_DIR" \
          --clean

    - name: Build GStreamer (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      env:
        VERSION: ${{ steps.config.outputs.version }}
        ARCH: ${{ inputs.arch }}
        BUILD_TYPE: ${{ inputs.build-type }}
      run: |
        $arch = $env:ARCH
        if ($arch -eq 'x86_64') { $arch = 'x64' }

        .\tools\setup\gstreamer\build-gstreamer-windows.ps1 `
          -Version $env:VERSION `
          -BuildType $env:BUILD_TYPE `
          -Arch $arch `
          -Prefix "C:\gstreamer-$arch" `
          -WorkDir '${{ runner.temp }}' `
          -QtPrefix $env:QT_ROOT_DIR `
          -Clean

    - name: Build GStreamer (Android)
      if: inputs.platform == 'android'
      shell: bash
      env:
        VERSION: ${{ steps.config.outputs.version }}
        ARCH: ${{ inputs.arch }}
        BUILD_TYPE: ${{ inputs.build-type }}
        OUTPUT: ${{ runner.temp }}/gstreamer
      run: |
        ./tools/setup/gstreamer/build-gstreamer-android.sh \
          --version "$VERSION" \
          --arch "$ARCH" \
          --type "$BUILD_TYPE" \
          --output "$OUTPUT" \
          --clean

    - name: Build GStreamer (iOS)
      if: inputs.platform == 'ios'
      shell: bash
      env:
        VERSION: ${{ steps.config.outputs.version }}
        ARCH: ${{ inputs.arch }}
        BUILD_TYPE: ${{ inputs.build-type }}
        OUTPUT: ${{ runner.temp }}/gstreamer
        SIMULATOR: ${{ inputs.simulator }}
      run: |
        args=(
          --version "$VERSION"
          --arch "$ARCH"
          --type "$BUILD_TYPE"
          --output "$OUTPUT"
          --clean
        )
        [[ "$SIMULATOR" == 'true' ]] && args+=(--simulator)

        ./tools/setup/gstreamer/build-gstreamer-ios.sh "${args[@]}"

    # ===== VERIFY =====

    - name: Verify build (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        prefix='${{ runner.temp }}/gstreamer'
        arch=$(uname -m)
        export LD_LIBRARY_PATH="$prefix/lib/$arch-linux-gnu"
        export GST_PLUGIN_PATH="$prefix/lib/$arch-linux-gnu/gstreamer-1.0"
        "$prefix/bin/gst-launch-1.0" --version

    - name: Verify build (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        prefix='${{ runner.temp }}/gstreamer'
        export DYLD_LIBRARY_PATH="$prefix/lib"
        export GST_PLUGIN_PATH="$prefix/lib/gstreamer-1.0"
        "$prefix/bin/gst-launch-1.0" --version

    - name: Verify build (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      env:
        ARCH: ${{ inputs.arch }}
      run: |
        $arch = $env:ARCH
        if ($arch -eq 'x86_64') { $arch = 'x64' }
        $prefix = "C:\gstreamer-$arch"

        Write-Host "=== Checking installation ==="
        Get-ChildItem (Join-Path $prefix 'bin') -Filter '*.exe' | Select-Object Name, Length | Format-Table
        $libCount = (Get-ChildItem (Join-Path $prefix 'lib') -Filter '*.lib' | Measure-Object).Count
        Write-Host "$libCount library files found"

    # ===== ARCHIVE & UPLOAD =====

    - name: Create archive
      id: archive
      shell: bash
      env:
        PLATFORM: ${{ inputs.platform }}
        ARCH: ${{ inputs.arch }}
        VERSION: ${{ steps.config.outputs.version }}
        SIMULATOR: ${{ inputs.simulator }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        # Determine prefix path
        if [[ "$PLATFORM" == "windows" ]]; then
          arch="$ARCH"
          [[ "$arch" == "x86_64" ]] && arch="x64"
          prefix="C:/gstreamer-$arch"
        else
          prefix="$RUNNER_TEMP/gstreamer"
        fi

        # Normalize arch for naming
        arch="$ARCH"
        [[ "$PLATFORM" == "windows" && "$arch" == "x86_64" ]] && arch="x64"

        # Build archive name
        case "$PLATFORM" in
          linux)   name="gstreamer-1.0-linux-$arch-$VERSION" ;;
          macos)   name="gstreamer-1.0-macos-$arch-$VERSION" ;;
          windows) name="gstreamer-1.0-msvc-$arch-$VERSION" ;;
          android) name="gstreamer-1.0-android-$arch-$VERSION" ;;
          ios)
            suffix="$arch"
            [[ "$SIMULATOR" == "true" ]] && suffix="$arch-simulator"
            name="gstreamer-1.0-ios-$suffix-$VERSION"
            ;;
        esac

        echo "name=$name" >> "$GITHUB_OUTPUT"

        # Create archive
        if [[ "$PLATFORM" == "windows" ]]; then
          archive_path="$RUNNER_TEMP/$name.zip"
          powershell -Command "Compress-Archive -Path '$prefix' -DestinationPath '$archive_path' -CompressionLevel Optimal"
          echo "path=$archive_path" >> "$GITHUB_OUTPUT"
          echo "ext=zip" >> "$GITHUB_OUTPUT"
        else
          archive_path="$RUNNER_TEMP/$name.tar.xz"
          parent_dir=$(dirname "$prefix")
          folder_name=$(basename "$prefix")
          tar -C "$parent_dir" -cJf "$archive_path" "$folder_name"
          echo "path=$archive_path" >> "$GITHUB_OUTPUT"
          echo "ext=tar.xz" >> "$GITHUB_OUTPUT"
        fi

        echo "Created archive: $archive_path"
        ls -lh "$archive_path"

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.archive.outputs.name }}
        path: ${{ steps.archive.outputs.path }}
        retention-days: 30

    - name: Upload to S3
      if: inputs.upload-s3 == 'true' && inputs.aws-access-key-id != ''
      shell: bash
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        AWS_DEFAULT_REGION: us-west-2
        PLATFORM: ${{ inputs.platform }}
        VERSION: ${{ steps.config.outputs.version }}
        ARCHIVE_PATH: ${{ steps.archive.outputs.path }}
        ARCHIVE_NAME: ${{ steps.archive.outputs.name }}
        ARCHIVE_EXT: ${{ steps.archive.outputs.ext }}
      run: |
        s3_path="s3://qgroundcontrol/dependencies/gstreamer/$PLATFORM/$VERSION"

        # Install AWS CLI if needed (Windows)
        if ! command -v aws &> /dev/null; then
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -o "$RUNNER_TEMP/AWSCLIV2.msi" "https://awscli.amazonaws.com/AWSCLIV2.msi"
            msiexec.exe /i "$RUNNER_TEMP/AWSCLIV2.msi" /quiet
            export PATH="/c/Program Files/Amazon/AWSCLIV2:$PATH"
          fi
        fi

        aws s3 cp "$ARCHIVE_PATH" "$s3_path/$ARCHIVE_NAME.$ARCHIVE_EXT" --acl public-read
        echo "Uploaded to: $s3_path/$ARCHIVE_NAME.$ARCHIVE_EXT"

    - name: Write summary
      shell: bash
      env:
        PLATFORM: ${{ inputs.platform }}
        VERSION: ${{ steps.config.outputs.version }}
        ARCH: ${{ inputs.arch }}
        SIMULATOR: ${{ inputs.simulator }}
      run: |
        arch="$ARCH"
        [[ "$PLATFORM" == "windows" && "$arch" == "x86_64" ]] && arch="x64"
        [[ "$PLATFORM" == "ios" && "$SIMULATOR" == "true" ]] && arch="$arch-simulator"

        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## GStreamer ${PLATFORM^} Build Complete

        | Property | Value |
        |----------|-------|
        | Version | $VERSION |
        | Architecture | $arch |
        | S3 Path | dependencies/gstreamer/$PLATFORM/$VERSION/ |
        EOF
