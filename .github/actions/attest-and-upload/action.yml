name: Attest and Upload
description: Generate SBOM attestation and upload build artifact (GitHub + optional AWS)

inputs:
  artifact-name:
    description: 'Artifact filename (e.g. QGroundControl.AppImage)'
    required: true
  package-name:
    description: 'Package name for GitHub artifact'
    required: true
  scan-path:
    description: 'Path to scan for SBOM (defaults to build dir)'
    required: false
    default: ''
  subject-name:
    description: 'SBOM subject name (defaults to package-name)'
    required: false
    default: ''
  aws-role-arn:
    description: 'AWS IAM role ARN for OIDC authentication (preferred)'
    required: false
    default: ''
  aws-key-id:
    description: 'AWS access key ID'
    required: false
    default: ''
  aws-secret-access-key:
    description: 'AWS secret access key'
    required: false
    default: ''
  aws-distribution-id:
    description: 'AWS CloudFront distribution ID'
    required: false
    default: ''
  upload-aws:
    description: 'Upload artifact to AWS'
    required: false
    default: 'true'
  retention-days:
    description: 'Days to retain GitHub artifact (default 7 for PRs, 30 for pushes)'
    required: false
    default: ''
  compression-level:
    description: 'GitHub artifact compression level 0-9 (0=none, best for pre-compressed binaries)'
    required: false
    default: '0'

runs:
  using: composite
  steps:
    - name: Attest Build with SBOM
      uses: ./.github/actions/attest-sbom
      with:
        subject-path: ${{ runner.temp }}/build/${{ inputs.artifact-name }}
        subject-name: ${{ inputs.subject-name || inputs.package-name }}
        scan-path: ${{ inputs.scan-path || format('{0}/build', runner.temp) }}

    - name: Save artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.package-name }}
        path: ${{ runner.temp }}/build/${{ inputs.artifact-name }}
        retention-days: ${{ inputs.retention-days != '' && inputs.retention-days || (github.event_name == 'pull_request' && '7' || '30') }}
        compression-level: ${{ inputs.compression-level }}

    - name: Upload to AWS
      if: >-
        fromJSON(inputs.upload-aws) &&
        github.event_name == 'push' &&
        github.repository_owner == 'mavlink' &&
        (inputs.aws-role-arn != '' || (inputs.aws-key-id != '' && inputs.aws-secret-access-key != ''))
      uses: ./.github/actions/aws-upload
      with:
        artifact-name: ${{ inputs.artifact-name }}
        artifact-path: ${{ runner.temp }}/build/${{ inputs.artifact-name }}
        aws-role-arn: ${{ inputs.aws-role-arn }}
        aws-key-id: ${{ inputs.aws-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-distribution-id: ${{ inputs.aws-distribution-id }}
