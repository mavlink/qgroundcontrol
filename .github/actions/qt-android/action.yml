name: Android Qt
description: Install Qt for Android
outputs:
  host_qt_root_dir:
    description: Desktop Qt root used for host tools
    value: ${{ steps.qt-host.outputs.qt_root_dir }}
  target_qt_root_dir:
    description: Android Qt root used for target packages
    value: ${{ steps.qt-target.outputs.qt_root_dir }}
inputs:
  host:
    description: Host
    required: true
  arch:
    description: Arch
    required: true
  version:
    description: Qt Version
    required: true
  modules:
    description: Qt Modules
    required: true
  abis:
    description: ABIs to Build
    required: false
    default: 'arm64-v8a;armeabi-v7a'
  cpm-modules:
    description: CPM Cache Path
    required: false
  build-type:
    description: Build Type (Debug or Release)
    required: false
    default: Release
  ndk-full-version:
    description: Android NDK full version (pass build-config.outputs.android_ndk_full_version)
    required: true
  java-version:
    description: Java version (pass build-config.outputs.android_java_version)
    required: true
  android-platform:
    description: Android platform/API level (pass build-config.outputs.android_platform)
    required: true
  android-cmdline-tools:
    description: Android cmdline-tools version (pass build-config.outputs.android_cmdline_tools)
    required: true
  android-build-tools:
    description: Android build-tools version (pass build-config.outputs.android_build_tools)
    required: true
  save-cache:
    description: "Whether to save cache (auto = save for pushes and same-repo PRs, skip for fork PRs)"
    required: false
    default: 'auto'
  aqt-source:
    description: Optional pip spec used to install aqtinstall (e.g. git+https://github.com/miurahr/aqtinstall.git@<sha>)
    required: false
    default: ''
runs:
  using: composite
  steps:
    # Gradle caching is handled by gradle/actions/setup-gradle inside build-setup (mode=android branch).
    - name: Setup Java Environment
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Android Environment
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: ${{ inputs.android-cmdline-tools }}
        packages: 'platform-tools platforms;android-${{ inputs.android-platform }} build-tools;${{ inputs.android-build-tools }} ndk;${{ inputs.ndk-full-version }}'
        log-accepted-android-sdk-licenses: false

    - name: Update Android SDK / NDK / Tools
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/android_sdk_helper.py" \
          --ndk-version "${INPUTS_NDK_FULL_VERSION}" \
          --workspace "${GITHUB_WORKSPACE}"
      env:
        INPUTS_NDK_FULL_VERSION: ${{ inputs.ndk-full-version }}

    - name: Setup Caching
      uses: ./.github/actions/cache
      with:
        host: ${{ inputs.host }}
        target: android
        build-type: ${{ inputs.build-type }}
        cpm-modules: ${{ inputs.cpm-modules }}
        save-cache: ${{ inputs.save-cache }}

    - name: Install Qt for ${{ runner.os }}
      id: qt-host
      uses: ./.github/actions/qt-install
      with:
        version: ${{ inputs.version }}
        host: ${{ inputs.host }}
        target: desktop
        arch: ${{ inputs.arch }}
        dir: ${{ runner.temp }}
        modules: ${{ inputs.modules }}
        aqt-source: ${{ inputs.aqt-source }}

    - name: Install Qt for Android (arm64_v8a)
      if: contains(format(';{0};', inputs.abis), ';arm64-v8a;')
      id: qt-android-arm64
      uses: ./.github/actions/qt-install
      with:
        version: ${{ inputs.version }}
        host: ${{ inputs.host }}
        target: android
        arch: android_arm64_v8a
        dir: ${{ runner.temp }}
        modules: ${{ inputs.modules }}
        export-env: 'false'
        aqt-source: ${{ inputs.aqt-source }}

    - name: Install Qt for Android (armv7)
      if: contains(format(';{0};', inputs.abis), ';armeabi-v7a;')
      id: qt-android-armv7
      uses: ./.github/actions/qt-install
      with:
        version: ${{ inputs.version }}
        host: ${{ inputs.host }}
        target: android
        arch: android_armv7
        dir: ${{ runner.temp }}
        modules: ${{ inputs.modules }}
        export-env: 'false'
        aqt-source: ${{ inputs.aqt-source }}

    - name: Install Qt for Android (x86_64)
      if: contains(format(';{0};', inputs.abis), ';x86_64;')
      id: qt-android-x86_64
      uses: ./.github/actions/qt-install
      with:
        version: ${{ inputs.version }}
        host: ${{ inputs.host }}
        target: android
        arch: android_x86_64
        dir: ${{ runner.temp }}
        modules: ${{ inputs.modules }}
        export-env: 'false'
        aqt-source: ${{ inputs.aqt-source }}

    - name: Install Qt for Android (x86)
      if: contains(format(';{0};', inputs.abis), ';x86;')
      id: qt-android-x86
      uses: ./.github/actions/qt-install
      with:
        version: ${{ inputs.version }}
        host: ${{ inputs.host }}
        target: android
        arch: android_x86
        dir: ${{ runner.temp }}
        modules: ${{ inputs.modules }}
        export-env: 'false'
        aqt-source: ${{ inputs.aqt-source }}

    - name: Resolve primary Android Qt root
      id: qt-target
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/tools/setup/install_qt.py" resolve-android-root \
          --abis "${INPUTS_ABIS}" \
          --arm64 "${STEPS_QT_ANDROID_ARM64_OUTPUTS_QT_ROOT_DIR}" \
          --armv7 "${STEPS_QT_ANDROID_ARMV7_OUTPUTS_QT_ROOT_DIR}" \
          --x86-64 "${STEPS_QT_ANDROID_X86_64_OUTPUTS_QT_ROOT_DIR}" \
          --x86 "${STEPS_QT_ANDROID_X86_OUTPUTS_QT_ROOT_DIR}"
      env:
        INPUTS_ABIS: ${{ inputs.abis }}
        STEPS_QT_ANDROID_ARM64_OUTPUTS_QT_ROOT_DIR: ${{ steps.qt-android-arm64.outputs.qt_root_dir }}
        STEPS_QT_ANDROID_ARMV7_OUTPUTS_QT_ROOT_DIR: ${{ steps.qt-android-armv7.outputs.qt_root_dir }}
        STEPS_QT_ANDROID_X86_64_OUTPUTS_QT_ROOT_DIR: ${{ steps.qt-android-x86_64.outputs.qt_root_dir }}
        STEPS_QT_ANDROID_X86_OUTPUTS_QT_ROOT_DIR: ${{ steps.qt-android-x86.outputs.qt_root_dir }}
