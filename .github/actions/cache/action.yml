name: Caching
description: Setup Caching
inputs:
  host:
    description: Host OS
    required: true
  target:
    description: Target OS
    required: true
  build-type:
    description: Build Type
    required: true
  cpm-modules:
    description: Path to CPM Modules
    required: false
  save-cache:
    description: Save cache (set to false for PR builds to save storage)
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Get ccache config
      id: ccache-config
      shell: bash
      run: |
        # Pin ccache version for reproducibility and to avoid API calls
        # Update periodically via Dependabot or manually
        CCACHE_VERSION="4.12.2"

        # Validate version format (defense in depth)
        if [[ ! "$CCACHE_VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
          echo "Error: Invalid ccache version format: $CCACHE_VERSION" >&2
          exit 1
        fi
        echo "version=${CCACHE_VERSION}" >> "$GITHUB_OUTPUT"

        # Determine architecture
        if [[ "${{ inputs.target }}" == "linux_gcc_arm64" ]]; then
          echo "arch=aarch64" >> "$GITHUB_OUTPUT"
        else
          echo "arch=x86_64" >> "$GITHUB_OUTPUT"
        fi

        # Read max_size from tools/ccache.conf (single source of truth)
        CCACHE_CONF_PATH="${{ github.workspace }}/tools/ccache.conf"
        CCACHE_MAX_SIZE="2G"  # Default
        if [[ -f "$CCACHE_CONF_PATH" ]]; then
          # Single awk pass to extract value (more robust than grep|sed)
          CCACHE_MAX_SIZE=$(awk -F'=' '/^max_size[[:space:]]*=/{gsub(/[[:space:]]/,"",$2); print $2; exit}' "$CCACHE_CONF_PATH")
          CCACHE_MAX_SIZE="${CCACHE_MAX_SIZE:-2G}"
        else
          echo "Warning: ccache config not found at $CCACHE_CONF_PATH, using default max_size" >&2
        fi
        echo "max_size=${CCACHE_MAX_SIZE}" >> "$GITHUB_OUTPUT"

    - name: Cache ccache binary (Linux)
      if: runner.os == 'Linux'
      id: ccache-binary
      uses: actions/cache@v5
      with:
        path: /usr/local/bin/ccache
        key: ccache-binary-${{ steps.ccache-config.outputs.version }}-linux-${{ steps.ccache-config.outputs.arch }}

    - name: Install ccache (Linux)
      if: runner.os == 'Linux' && steps.ccache-binary.outputs.cache-hit != 'true'
      shell: bash
      env:
        CCACHE_VERSION: ${{ steps.ccache-config.outputs.version }}
        CCACHE_ARCH: ${{ steps.ccache-config.outputs.arch }}
        # Public key from https://ccache.dev/download.html (v4.12+)
        CCACHE_MINISIGN_KEY: "RWQX7yXbBedVfI4PNx6FLdFXu9GHUFsr28s4BVGxm4BeybtnX3P06saF"
      run: |
        set -e
        ARCHIVE="ccache-${CCACHE_VERSION}-linux-${CCACHE_ARCH}.tar.xz"
        wget --quiet --tries=3 --waitretry=5 "https://github.com/ccache/ccache/releases/download/v${CCACHE_VERSION}/${ARCHIVE}"
        wget --quiet --tries=3 --waitretry=5 "https://github.com/ccache/ccache/releases/download/v${CCACHE_VERSION}/${ARCHIVE}.minisig"
        # Install minisign from GitHub releases (not available in Ubuntu repos)
        MINISIGN_VERSION="0.11"
        wget --quiet --tries=3 --waitretry=5 "https://github.com/jedisct1/minisign/releases/download/${MINISIGN_VERSION}/minisign-${MINISIGN_VERSION}-linux.tar.gz"
        tar -xzf "minisign-${MINISIGN_VERSION}-linux.tar.gz"
        # Use appropriate minisign binary for architecture
        if [[ "${CCACHE_ARCH}" == "aarch64" ]]; then
          MINISIGN_BIN="./minisign-linux/aarch64/minisign"
        else
          MINISIGN_BIN="./minisign-linux/x86_64/minisign"
        fi
        "$MINISIGN_BIN" -Vm "$ARCHIVE" -P "$CCACHE_MINISIGN_KEY"
        tar -xf "$ARCHIVE"
        sudo cp "ccache-${CCACHE_VERSION}-linux-${CCACHE_ARCH}/ccache" /usr/local/bin/ccache
        sudo chmod +x /usr/local/bin/ccache

    # Note: sccache doesn't have ARM64 Windows binaries, skip for native ARM64 builds
    - name: Setup sccache (Windows x64)
      if: runner.os == 'Windows' && inputs.target != 'android' && inputs.target != 'win64_msvc2022_arm64'
      uses: mozilla-actions/sccache-action@v0.0.9

    - run: echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
      if: runner.os == 'Windows' && inputs.target != 'android' && inputs.target != 'win64_msvc2022_arm64'
      shell: bash

    - name: Setup Build Cache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        # Use sccache for Windows x64, ccache for everything else (including Windows ARM64)
        variant: ${{ runner.os == 'Windows' && inputs.target != 'android' && inputs.target != 'win64_msvc2022_arm64' && 'sccache' || 'ccache' }}
        key: ${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}
        restore-keys: |
          ${{ inputs.host }}-${{ inputs.target }}
          ${{ inputs.host }}-
        max-size: ${{ steps.ccache-config.outputs.max_size }}
        verbose: 2
        evict-old-files: job
        save: ${{ inputs.save-cache == 'true' }}

    - name: Ensure cpm-modules directory exists
      if: inputs.cpm-modules != ''
      run: mkdir -p "${{ inputs.cpm-modules }}"
      shell: bash

    - name: Cache CPM Modules
      if: inputs.cpm-modules != ''
      uses: actions/cache@v5
      with:
        path: ${{ inputs.cpm-modules }}
        key: ${{ github.workflow }}-cpm-${{ hashFiles('package-lock.cmake', 'CMakeLists.txt') }}
        restore-keys: ${{ github.workflow }}-cpm-
