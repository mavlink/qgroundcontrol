name: Caching
description: Setup Caching
inputs:
  host:
    description: Host OS
    required: true
  target:
    description: Target OS
    required: true
  build-type:
    description: Build Type
    required: true
  cpm-modules:
    description: Path to CPM Modules
    required: false
  save-cache:
    description: Save cache (set to false for PR builds to save storage)
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Determine cache scope
      id: cache-scope
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        scope="shared"
        case "${EVENT_NAME}" in
          pull_request)
            scope="pr-${PR_NUMBER:-unknown}"
            ;;
          workflow_dispatch)
            scope="manual-${REF_NAME}"
            ;;
          push)
            if [[ "${REF_NAME}" != "master" ]]; then
              scope="branch-${REF_NAME}"
            fi
            ;;
          *)
            scope="${EVENT_NAME}-${REF_NAME}"
            ;;
        esac
        scope="${scope//\//-}"
        echo "scope=${scope}" >> "$GITHUB_OUTPUT"

    - name: Get ccache config
      id: ccache-config
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" config \
          --target "${{ inputs.target }}" \
          --conf "${GITHUB_WORKSPACE}/tools/configs/ccache.conf"

    - name: Cache ccache binary (Linux)
      if: runner.os == 'Linux'
      id: ccache-binary
      uses: actions/cache@v5
      with:
        path: /usr/local/bin/ccache
        key: ccache-binary-${{ steps.ccache-config.outputs.version }}-linux-${{ steps.ccache-config.outputs.arch }}

    - name: Install ccache (Linux)
      if: runner.os == 'Linux' && steps.ccache-binary.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" install \
          --version "${{ steps.ccache-config.outputs.version }}" \
          --arch "${{ steps.ccache-config.outputs.arch }}"

    - name: Install ccache (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        if ! command -v ccache >/dev/null 2>&1; then
          brew install ccache
        fi
        ccache --version

    - name: Setup sccache (Windows x64)
      if: runner.os == 'Windows' && inputs.target != 'android' && inputs.host != 'windows_arm64'
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Enable sccache GHA cache backend
      if: runner.os == 'Windows' && inputs.target != 'android' && inputs.host != 'windows_arm64'
      shell: bash
      run: echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"

    - name: Determine Windows ccache arch
      if: runner.os == 'Windows' && (inputs.target == 'android' || inputs.host == 'windows_arm64')
      id: win-ccache
      shell: bash
      run: |
        if [[ "${{ inputs.host }}" == "windows_arm64" ]]; then
          echo "arch=aarch64" >> "$GITHUB_OUTPUT"
          echo "sha256=5907c8f74dcfff920ee57df55a5cb98164630665926b2ba9085e9f5fb701c58f" >> "$GITHUB_OUTPUT"
        else
          echo "arch=x86_64" >> "$GITHUB_OUTPUT"
          echo "sha256=1c78a0b816a3174d4b170b96294e016a21fb4a577dfd8361e7322f77f85c6348" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache ccache binary (Windows)
      if: runner.os == 'Windows' && (inputs.target == 'android' || inputs.host == 'windows_arm64')
      id: ccache-binary-win
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/ccache-${{ steps.ccache-config.outputs.version }}-windows-${{ steps.win-ccache.outputs.arch }}/ccache.exe
        key: ccache-binary-${{ steps.ccache-config.outputs.version }}-windows-${{ steps.win-ccache.outputs.arch }}

    - name: Install ccache (Windows)
      if: runner.os == 'Windows' && (inputs.target == 'android' || inputs.host == 'windows_arm64') && steps.ccache-binary-win.outputs.cache-hit != 'true'
      shell: bash
      env:
        CCACHE_VERSION: ${{ steps.ccache-config.outputs.version }}
        CCACHE_ARCH: ${{ steps.win-ccache.outputs.arch }}
        # Update hashes when bumping CCACHE_VERSION
        CCACHE_WIN_SHA256: ${{ steps.win-ccache.outputs.sha256 }}
      run: |
        set -euo pipefail
        ccache_url="https://github.com/ccache/ccache/releases/download/v${CCACHE_VERSION}/ccache-${CCACHE_VERSION}-windows-${CCACHE_ARCH}.zip"
        temp_dir="$(mktemp -d)"
        temp_root="${RUNNER_TEMP//\\//}"
        install_dir="${temp_root}/ccache-${CCACHE_VERSION}-windows-${CCACHE_ARCH}"

        curl --fail --location --silent --show-error "$ccache_url" -o "${temp_dir}/ccache.zip"
        actual=$(python3 -c "import hashlib,sys;print(hashlib.sha256(open(sys.argv[1],'rb').read()).hexdigest())" "${temp_dir}/ccache.zip")
        if [[ "$actual" != "${CCACHE_WIN_SHA256}" ]]; then
          echo "SHA256 mismatch: ${actual} != ${CCACHE_WIN_SHA256}" >&2
          exit 1
        fi
        echo "SHA256 verified"
        unzip -q "${temp_dir}/ccache.zip" -d "$temp_dir"
        mkdir -p "$install_dir"
        cp "${temp_dir}/ccache-${CCACHE_VERSION}-windows-${CCACHE_ARCH}/ccache.exe" "${install_dir}/ccache.exe"

    - name: Add ccache to PATH (Windows)
      if: runner.os == 'Windows' && (inputs.target == 'android' || inputs.host == 'windows_arm64')
      shell: bash
      env:
        CCACHE_VERSION: ${{ steps.ccache-config.outputs.version }}
        CCACHE_ARCH: ${{ steps.win-ccache.outputs.arch }}
      run: |
        set -euo pipefail
        temp_root="${RUNNER_TEMP//\\//}"
        install_dir="${temp_root}/ccache-${CCACHE_VERSION}-windows-${CCACHE_ARCH}"
        if [ ! -f "${install_dir}/ccache.exe" ]; then
          echo "Error: ccache.exe not found at ${install_dir}/ccache.exe" >&2
          exit 1
        fi

        echo "$install_dir" >> "$GITHUB_PATH"
        "${install_dir}/ccache.exe" --version

    - name: Configure ccache environment
      if: "!(runner.os == 'Windows' && inputs.target != 'android' && inputs.host != 'windows_arm64')"
      shell: bash
      run: |
        workspace_path="${GITHUB_WORKSPACE//\\//}"
        echo "CCACHE_DIR=${workspace_path}/.ccache" >> "$GITHUB_ENV"
        echo "CCACHE_BASEDIR=${workspace_path}" >> "$GITHUB_ENV"
        echo "CCACHE_CONFIGPATH=${workspace_path}/tools/configs/ccache.conf" >> "$GITHUB_ENV"
        mkdir -p "${workspace_path}/.ccache"

    - name: Configure CPM source cache
      if: inputs.cpm-modules != ''
      id: cpm-cache
      shell: bash
      env:
        CPM_MODULES_INPUT: ${{ inputs.cpm-modules }}
      run: |
        cpm_cache_path="${CPM_MODULES_INPUT//\\//}"
        mkdir -p "${cpm_cache_path}"
        echo "CPM_SOURCE_CACHE=${cpm_cache_path}" >> "$GITHUB_ENV"
        echo "path=${cpm_cache_path}" >> "$GITHUB_OUTPUT"

    - name: Compute CPM dependency fingerprint
      if: inputs.cpm-modules != ''
      id: cpm-key
      shell: bash
      run: |
        set -euo pipefail
        fingerprint="$(python3 - <<'PY'
        import hashlib
        import re
        from pathlib import Path

        root = Path(".")
        declaration_re = re.compile(r"CPM(Add|Find)Package|FetchContent_Declare")

        candidates: list[Path] = []
        for exact in [Path("CMakeLists.txt"), Path("cmake/modules/CPM.cmake"), Path(".github/build-config.json")]:
            if exact.exists():
                candidates.append(exact)

        if (root / "cmake").exists():
            candidates.extend((root / "cmake").rglob("*.cmake"))
        if (root / "src").exists():
            candidates.extend((root / "src").rglob("CMakeLists.txt"))
        if (root / "test").exists():
            candidates.extend((root / "test").rglob("CMakeLists.txt"))

        dep_files: list[Path] = []
        for path in candidates:
            if not path.is_file():
                continue
            if path.name == "build-config.json":
                dep_files.append(path)
                continue
            try:
                text = path.read_text(encoding="utf-8", errors="ignore")
            except OSError:
                continue
            if declaration_re.search(text):
                dep_files.append(path)

        paths = sorted({str(path.as_posix()) for path in dep_files})
        h = hashlib.sha256()
        for rel in paths:
            path = Path(rel)
            try:
                content = path.read_bytes()
            except OSError:
                continue
            h.update(rel.encode("utf-8"))
            h.update(b"\0")
            h.update(content)
            h.update(b"\0")

        print(h.hexdigest())
        PY
        )"
        echo "fingerprint=${fingerprint}" >> "$GITHUB_OUTPUT"

    - name: Restore Build Cache (ccache, save)
      if: "!(runner.os == 'Windows' && inputs.target != 'android' && inputs.host != 'windows_arm64') && inputs.save-cache == 'true'"
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-${{ hashFiles('.github/build-config.json', 'tools/configs/ccache.conf') }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-shared-
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-
          ccache-${{ inputs.host }}-${{ inputs.target }}-
          ccache-${{ inputs.host }}-

    - name: Restore Build Cache (ccache, read-only)
      if: "!(runner.os == 'Windows' && inputs.target != 'android' && inputs.host != 'windows_arm64') && inputs.save-cache != 'true'"
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-${{ hashFiles('.github/build-config.json', 'tools/configs/ccache.conf') }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-shared-
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}-
          ccache-${{ inputs.host }}-${{ inputs.target }}-
          ccache-${{ inputs.host }}-

    - name: Initialize ccache stats
      if: "!(runner.os == 'Windows' && inputs.target != 'android' && inputs.host != 'windows_arm64')"
      shell: bash
      run: |
        ccache -z
        echo "CCACHE_START_TIME=$(date +%s)" >> "$GITHUB_ENV"

    - name: Cache CPM Modules (restore and save)
      if: inputs.cpm-modules != '' && inputs.save-cache == 'true'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cpm-cache.outputs.path }}
        key: cpm-modules-${{ steps.cache-scope.outputs.scope }}-${{ steps.cpm-key.outputs.fingerprint }}
        restore-keys: |
          cpm-modules-${{ steps.cache-scope.outputs.scope }}-
          cpm-modules-shared-
          cpm-modules-

    - name: Cache CPM Modules (restore only)
      if: inputs.cpm-modules != '' && inputs.save-cache != 'true'
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.cpm-cache.outputs.path }}
        key: cpm-modules-${{ steps.cache-scope.outputs.scope }}-${{ steps.cpm-key.outputs.fingerprint }}
        restore-keys: |
          cpm-modules-${{ steps.cache-scope.outputs.scope }}-
          cpm-modules-shared-
          cpm-modules-
