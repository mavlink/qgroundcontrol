name: Caching
description: Setup Caching
inputs:
  host:
    description: Host OS
    required: true
  target:
    description: Target OS
    required: true
  build-type:
    description: Build Type
    required: true
  variant:
    description: Optional discriminator (e.g. coverage|asan) — distinct compile flags must not share a ccache key.
    required: false
    default: ''
  cpm-modules:
    description: Path to CPM Modules
    required: false
  save-cache:
    description: "Whether to save cache (auto = save for pushes and same-repo PRs, skip for fork PRs)"
    required: false
    default: 'auto'
runs:
  using: composite
  steps:
    - name: Resolve save-cache
      id: cache-policy
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        THIS_REPO: ${{ github.repository }}
        REQUESTED: ${{ inputs.save-cache }}
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/cache_policy.py" --requested "${REQUESTED}"

    - name: Determine cache scope
      id: cache-scope
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" scope --event-name "${EVENT_NAME}" --ref-name "${REF_NAME}" --pr-number "${PR_NUMBER:-}"

    - name: Get ccache config
      id: ccache-config
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" config \
          --target "${INPUTS_TARGET}" \
          --conf "${GITHUB_WORKSPACE}/tools/configs/ccache.conf"
      env:
        INPUTS_TARGET: ${{ inputs.target }}

    - name: Install ccache (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" install \
          --version "${STEPS_CCACHE_CONFIG_OUTPUTS_VERSION}" \
          --arch "${STEPS_CCACHE_CONFIG_OUTPUTS_ARCH}"
      env:
        STEPS_CCACHE_CONFIG_OUTPUTS_VERSION: ${{ steps.ccache-config.outputs.version }}
        STEPS_CCACHE_CONFIG_OUTPUTS_ARCH: ${{ steps.ccache-config.outputs.arch }}

    - name: Install mold (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/mold_helper.py" install \
          --arch "${STEPS_CCACHE_CONFIG_OUTPUTS_ARCH}"
      env:
        STEPS_CCACHE_CONFIG_OUTPUTS_ARCH: ${{ steps.ccache-config.outputs.arch }}

    - name: Resolve macOS ccache SHA256
      if: runner.os == 'macOS'
      id: mac-ccache
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" macos-config

    - name: Install ccache (macOS)
      if: runner.os == 'macOS'
      shell: bash
      env:
        CCACHE_VERSION: ${{ steps.ccache-config.outputs.version }}
        CCACHE_MAC_SHA256: ${{ steps.mac-ccache.outputs.sha256 }}
      run: |
        sudo python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" install-macos \
          --version "${CCACHE_VERSION}" \
          --sha256 "${CCACHE_MAC_SHA256}"
        ccache --version

    - name: Determine Windows ccache arch
      if: runner.os == 'Windows'
      id: win-ccache
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" windows-config --host "${INPUTS_HOST}" --target "${INPUTS_TARGET}"
      env:
        INPUTS_HOST: ${{ inputs.host }}
        INPUTS_TARGET: ${{ inputs.target }}

    - name: Install ccache (Windows)
      if: runner.os == 'Windows'
      shell: bash
      env:
        CCACHE_VERSION: ${{ steps.ccache-config.outputs.version }}
        CCACHE_ARCH: ${{ steps.win-ccache.outputs.arch }}
        CCACHE_WIN_SHA256: ${{ steps.win-ccache.outputs.sha256 }}
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" install-windows \
          --version "${CCACHE_VERSION}" \
          --arch "${CCACHE_ARCH}" \
          --sha256 "${CCACHE_WIN_SHA256}" \
          --runner-temp "${RUNNER_TEMP//\\//}"

    - name: Add ccache to PATH (Windows)
      if: runner.os == 'Windows'
      shell: bash
      env:
        CCACHE_VERSION: ${{ steps.ccache-config.outputs.version }}
        CCACHE_ARCH: ${{ steps.win-ccache.outputs.arch }}
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" add-windows-path --version "${CCACHE_VERSION}" --arch "${CCACHE_ARCH}" --runner-temp "${RUNNER_TEMP//\\//}"

    - name: Configure ccache environment
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" configure-env --workspace "${GITHUB_WORKSPACE//\\//}"

    - name: Configure CPM source cache
      if: inputs.cpm-modules != ''
      id: cpm-cache
      shell: bash
      env:
        CPM_MODULES_INPUT: ${{ inputs.cpm-modules }}
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/cpm_helper.py" configure-cache --path "${CPM_MODULES_INPUT}"

    - name: Compute CPM dependency fingerprint
      if: inputs.cpm-modules != ''
      id: cpm-key
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/cpm_helper.py" fingerprint --root "${GITHUB_WORKSPACE}"

    - name: Restore Build Cache (ccache, save)
      if: steps.cache-policy.outputs.save == 'true' && inputs.variant != 'coverage'
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}${{ inputs.variant && format('-{0}', inputs.variant) }}-${{ steps.cache-scope.outputs.scope }}-${{ hashFiles('.github/build-config.json', 'tools/configs/ccache.conf') }}
        restore-keys: |
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}${{ inputs.variant && format('-{0}', inputs.variant) }}-${{ steps.cache-scope.outputs.scope }}-
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}${{ inputs.variant && format('-{0}', inputs.variant) }}-shared-
          ${{ inputs.variant && format('ccache-{0}-{1}-{2}-shared-', inputs.host, inputs.target, inputs.build-type) || '' }}

    - name: Restore Build Cache (ccache, read-only)
      if: steps.cache-policy.outputs.save != 'true' && inputs.variant != 'coverage'
      uses: actions/cache/restore@v5
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}${{ inputs.variant && format('-{0}', inputs.variant) }}-${{ steps.cache-scope.outputs.scope }}-${{ hashFiles('.github/build-config.json', 'tools/configs/ccache.conf') }}
        restore-keys: |
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}${{ inputs.variant && format('-{0}', inputs.variant) }}-${{ steps.cache-scope.outputs.scope }}-
          ccache-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.build-type }}${{ inputs.variant && format('-{0}', inputs.variant) }}-shared-
          ${{ inputs.variant && format('ccache-{0}-{1}-{2}-shared-', inputs.host, inputs.target, inputs.build-type) || '' }}

    - name: Initialize ccache stats
      shell: bash
      run: ccache -z

    # CPM is content-identical across build types; only Release writes the
    # cache. Debug + sanitizer + coverage jobs are read-only to avoid parallel
    # save races on the same key (last-writer-wins waste).
    - name: Cache CPM Modules (restore and save)
      if: inputs.cpm-modules != '' && steps.cache-policy.outputs.save == 'true' && inputs.build-type == 'Release'
      uses: actions/cache@v5
      with:
        path: ${{ steps.cpm-cache.outputs.path }}
        key: cpm-modules-${{ steps.cache-scope.outputs.scope }}-${{ steps.cpm-key.outputs.fingerprint }}
        restore-keys: |
          cpm-modules-${{ steps.cache-scope.outputs.scope }}-
          cpm-modules-shared-

    - name: Cache CPM Modules (restore only)
      if: inputs.cpm-modules != '' && (steps.cache-policy.outputs.save != 'true' || inputs.build-type != 'Release')
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.cpm-cache.outputs.path }}
        key: cpm-modules-${{ steps.cache-scope.outputs.scope }}-${{ steps.cpm-key.outputs.fingerprint }}
        restore-keys: |
          cpm-modules-${{ steps.cache-scope.outputs.scope }}-
          cpm-modules-shared-
