name: Verify Executable
description: Run simple boot test on QGroundControl binary or package

inputs:
  binary-path:
    description: "Path to executable or package to verify"
    required: true
  type:
    description: "Type of executable (binary, appimage, dmg, exe) - currently informational"
    required: false
    default: "binary"
  working-dir:
    description: "Working directory (defaults to binary parent directory)"
    required: false
    default: ""
  build-dir:
    description: "CMake build directory (used to locate auto-downloaded GStreamer SDK for dev builds)"
    required: false
    default: ""
  timeout:
    description: "Timeout in seconds"
    required: false
    default: "60"

runs:
  using: composite
  steps:
    - name: Verify executable
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/verify_executable.py" \
          --binary-path "${INPUTS_BINARY_PATH}" \
          --type "${INPUTS_TYPE}" \
          --working-dir "${INPUTS_WORKING_DIR}" \
          --build-dir "${INPUTS_BUILD_DIR}" \
          --timeout "${INPUTS_TIMEOUT}"
      env:
        INPUTS_BINARY_PATH: ${{ inputs.binary-path }}
        INPUTS_TYPE: ${{ inputs.type }}
        INPUTS_WORKING_DIR: ${{ inputs.working-dir }}
        INPUTS_BUILD_DIR: ${{ inputs.build-dir }}
        INPUTS_TIMEOUT: ${{ inputs.timeout }}
