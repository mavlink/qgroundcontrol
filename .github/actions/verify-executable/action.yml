name: Verify Executable
description: Run simple boot test on QGroundControl binary or package

inputs:
  binary-path:
    description: "Path to executable or package to verify"
    required: true
  type:
    description: "Type of executable (binary, appimage, dmg, exe) - currently informational"
    required: false
    default: "binary"
  working-dir:
    description: "Working directory (defaults to binary parent directory)"
    required: false
    default: ""
  build-dir:
    description: "CMake build directory (used to locate auto-downloaded GStreamer SDK for dev builds)"
    required: false
    default: ""
  timeout:
    description: "Timeout in seconds"
    required: false
    default: "60"

runs:
  using: composite
  steps:
    - name: Verify executable
      shell: bash
      env:
        INPUT_BINARY_PATH: ${{ inputs.binary-path }}
        INPUT_WORKING_DIR: ${{ inputs.working-dir }}
        INPUT_BUILD_DIR: ${{ inputs.build-dir }}
        INPUT_TYPE: ${{ inputs.type }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -euo pipefail

        binary_path="${INPUT_BINARY_PATH}"

        if [[ -n "${INPUT_WORKING_DIR}" ]]; then
          work_dir="${INPUT_WORKING_DIR}"
        else
          work_dir="$(dirname "${binary_path}")"
        fi

        binary_name="$(basename "${binary_path}")"
        run_binary="${binary_name}"
        run_headless="true"

        # AppImages typically don't ship the "offscreen" Qt platform plugin.
        # Let run_tests.py use xvfb-run (Linux, no DISPLAY) instead.
        if [[ "${INPUT_TYPE}" == "appimage" || "${binary_name}" == *.AppImage ]]; then
          run_headless="false"
        fi

        if [[ ! -d "${work_dir}" ]]; then
          echo "::error::Working directory not found: ${work_dir}"
          exit 1
        fi

        pushd "${work_dir}" >/dev/null

        if [[ "${RUNNER_OS}" != "Windows" ]]; then
          chmod +x "${binary_name}" 2>/dev/null || true
          run_binary="${PWD}/${binary_name}"
        fi

        if command -v python3 >/dev/null 2>&1; then
          py_cmd="python3"
        elif command -v python >/dev/null 2>&1; then
          py_cmd="python"
        else
          echo "Error: Python interpreter not found in PATH" >&2
          exit 1
        fi

        # For dev builds (before cmake --install), GStreamer plugins haven't been
        # copied into the app bundle yet. Extract GStreamer_ROOT_DIR from CMakeCache
        # and set env vars so the runtime can find the auto-downloaded SDK's plugins.
        if [[ -n "${INPUT_BUILD_DIR}" && -f "${INPUT_BUILD_DIR}/CMakeCache.txt" ]]; then
          gst_root=$(grep -m1 '^GStreamer_ROOT_DIR:' "${INPUT_BUILD_DIR}/CMakeCache.txt" | cut -d= -f2-)
          if [[ -n "${gst_root}" && -d "${gst_root}/lib/gstreamer-1.0" ]]; then
            echo "Setting GStreamer env from build cache: ${gst_root}"
            plugin_dir="${gst_root}/lib/gstreamer-1.0"
            export GST_PLUGIN_PATH="${plugin_dir}"
            export GST_PLUGIN_PATH_1_0="${plugin_dir}"
            export GST_PLUGIN_SYSTEM_PATH="${plugin_dir}"
            export GST_PLUGIN_SYSTEM_PATH_1_0="${plugin_dir}"

            scanner="${gst_root}/libexec/gstreamer-1.0/gst-plugin-scanner"
            if [[ "${RUNNER_OS}" == "Windows" ]]; then
              scanner="${scanner}.exe"
            fi
            if [[ -x "${scanner}" ]]; then
              export GST_PLUGIN_SCANNER="${scanner}"
              export GST_PLUGIN_SCANNER_1_0="${scanner}"
            fi

            if [[ "${RUNNER_OS}" == "macOS" ]]; then
              export DYLD_LIBRARY_PATH="${gst_root}/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
            elif [[ "${RUNNER_OS}" == "Windows" ]]; then
              export PATH="${gst_root}/bin${PATH:+:$PATH}"
            fi
          fi
        fi

        set +e
        args=(
          --binary "${run_binary}"
          --timeout "${INPUT_TIMEOUT}"
          --verify-only
          -v
        )
        if [[ "${run_headless}" == "true" ]]; then
          args+=(--headless)
        fi
        "${py_cmd}" "${GITHUB_WORKSPACE}/tools/run_tests.py" "${args[@]}"
        exit_code=$?
        set -e

        popd >/dev/null

        exit "${exit_code}"
