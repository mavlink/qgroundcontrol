name: Setup Python
description: Setup Python with uv for fast dependency installation

inputs:
  groups:
    description: 'Dependency groups to install (comma-separated: scripts, precommit, test, ci, qt, coverage, dev, all)'
    required: false
    default: 'ci'
  python-version:
    description: 'Python version'
    required: false
    default: '3.12'

runs:
  using: composite
  steps:
    # uv provisions the interpreter itself (standalone CPython), avoiding the
    # actions/setup-python installer that dumps the whole Python tree on a
    # tool-cache miss (every run on the bare RunsOn images).
    - name: Setup uv and Python ${{ inputs.python-version }}
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: false
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      env:
        GROUPS: ${{ inputs.groups }}
      run: |
        uv run --no-project python tools/setup/install_python.py "$GROUPS"

    - name: Add venv to PATH
      shell: bash
      run: | # zizmor: ignore[github-env] writes fixed runner workspace .venv path to PATH; not attacker-controllable
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"
        else
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
        fi

    # Mirrors step-debug toggle; tools/_bootstrap.py picks this up and enables faulthandler + ::error:: hooks.
    - name: Enable QGC_CI_DEBUG when runner debug logging is on
      if: runner.debug == '1'
      shell: bash
      run: echo "QGC_CI_DEBUG=1" >> "$GITHUB_ENV"
