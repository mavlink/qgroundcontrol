name: Install Dependencies
description: Install platform-specific build dependencies (GStreamer, etc.)

inputs:
  gstreamer:
    description: 'Install GStreamer (Windows x64 only)'
    required: false
    default: 'true'
  gstreamer-version:
    description: 'GStreamer version (default: from build-config.json)'
    required: false
    default: ''
  vulkan:
    description: 'Install Vulkan SDK (Windows only, for validation layers)'
    required: false
    default: 'false'
  msvc:
    description: 'Install Visual Studio Build Tools / VCTools (Windows only)'
    required: false
    default: 'false'
  msvc-arm64:
    description: 'Also add the ARM64 cross compiler component (Windows only)'
    required: false
    default: 'false'
  nsis:
    description: 'Install NSIS / makensis for the installer build (Windows only)'
    required: false
    default: 'false'
  extra-packages:
    description: 'Additional packages to install (space-separated, Linux only)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Python (Windows)
      if: runner.os == 'Windows'
      uses: ./.github/actions/setup-python

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      uses: nick-fields/retry@v4
      env:
        INPUT_GSTREAMER: ${{ inputs.gstreamer }}
        INPUT_GSTREAMER_VERSION: ${{ inputs.gstreamer-version }}
        INPUT_VULKAN: ${{ inputs.vulkan }}
        INPUT_MSVC: ${{ inputs.msvc }}
        INPUT_MSVC_ARM64: ${{ inputs.msvc-arm64 }}
        INPUT_NSIS: ${{ inputs.nsis }}
      with:
        timeout_minutes: 20
        max_attempts: 3
        shell: python
        command: |
          import os, subprocess, sys
          args = [sys.executable, './tools/setup/install_dependencies', '--platform', 'windows']
          if os.environ.get('INPUT_GSTREAMER_VERSION'):
              args += ['--gstreamer-version', os.environ['INPUT_GSTREAMER_VERSION']]
          if os.environ.get('INPUT_GSTREAMER') != 'true':
              args.append('--skip-gstreamer')
          if os.environ.get('INPUT_VULKAN') == 'true':
              args.append('--vulkan')
          if os.environ.get('INPUT_MSVC') == 'true':
              args.append('--msvc')
          if os.environ.get('INPUT_MSVC_ARM64') == 'true':
              args.append('--msvc-arm64')
          if os.environ.get('INPUT_NSIS') == 'true':
              args.append('--nsis')
          sys.exit(subprocess.run(args).returncode)

    - name: Get system package list (Linux)
      if: runner.os == 'Linux'
      id: linux-deps
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" print-packages

    - name: Enable universe repository (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" enable-universe

    # Cache downloaded .debs so slow apt mirrors only hurt on a cache miss.
    # Keyed on the package-list sources plus a year-month stamp: actions/cache
    # never re-saves on an exact key hit, so without the stamp the cache would
    # go stale as noble-updates bumps package versions. The cache is saved by
    # the post step even if the install step fails (see the chown note there).
    - name: Compute apt cache stamps (Linux)
      if: runner.os == 'Linux'
      id: apt-cache-stamp
      shell: bash
      # The distro stamp (e.g. ubuntu-24.04) segregates caches per runner image:
      # this action runs on multiple Ubuntu versions whose .debs don't overlap.
      run: |
        echo "month=$(date -u +%Y-%m)" >> "${GITHUB_OUTPUT}"
        echo "distro=$(. /etc/os-release && echo "${ID}-${VERSION_ID}")" >> "${GITHUB_OUTPUT}"

    - name: Restore apt download cache (Linux)
      if: runner.os == 'Linux'
      uses: actions/cache@v5
      with:
        path: ~/.cache/qgc-apt-archives
        key: apt-debs-${{ steps.apt-cache-stamp.outputs.distro }}-${{ runner.arch }}-${{ steps.apt-cache-stamp.outputs.month }}-${{ hashFiles('tools/setup/install_dependencies/_packages.py', 'tools/setup/install_dependencies/_debian.py') }}
        restore-keys: |
          apt-debs-${{ steps.apt-cache-stamp.outputs.distro }}-${{ runner.arch }}-${{ steps.apt-cache-stamp.outputs.month }}-
          apt-debs-${{ steps.apt-cache-stamp.outputs.distro }}-${{ runner.arch }}-

    - name: Install apt packages (Linux)
      if: runner.os == 'Linux'
      shell: bash
      env:
        APT_PACKAGES: ${{ steps.linux-deps.outputs.packages }}
      # Retry/cache/timeout rationale lives in .github/scripts/apt_install_retry.sh,
      # which downloads .debs into the cached directory restored above.
      run: |
        read -ra packages <<< "${APT_PACKAGES}"
        "${GITHUB_WORKSPACE}/.github/scripts/apt_install_retry.sh" \
          --update --no-install-recommends --autoclean "${packages[@]}"

    - name: Fix apt alternatives (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" fix-apt-alternatives

    - name: Install optional apt packages (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" install-optional

    - name: Install pipx packages (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 tools/setup/install_dependencies --platform debian --skip-system-packages

    - name: Install extra packages (Linux)
      if: runner.os == 'Linux' && inputs.extra-packages != ''
      shell: bash
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      # Same retry/cache helper as "Install apt packages" above; shorter install
      # timeout since this only ever installs a handful of small packages.
      run: |
        read -ra extra <<< "${EXTRA_PACKAGES}"
        validated="$(python3 tools/setup/install_dependencies --validate-extra-packages "${extra[@]}")"
        read -ra packages <<< "${validated}"
        "${GITHUB_WORKSPACE}/.github/scripts/apt_install_retry.sh" \
          --install-timeout 300 --label "extra apt packages" "${packages[@]}"

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      uses: nick-fields/retry@v4
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: |
          python3 tools/setup/install_dependencies --platform macos

