name: Install Dependencies
description: Install platform-specific build dependencies (GStreamer, etc.)

inputs:
  gstreamer:
    description: 'Install GStreamer (Windows x64 only)'
    required: false
    default: 'true'
  gstreamer-version:
    description: 'GStreamer version (default: from build-config.json)'
    required: false
    default: ''
  vulkan:
    description: 'Install Vulkan SDK (Windows only, for validation layers)'
    required: false
    default: 'false'
  extra-packages:
    description: 'Additional packages to install (space-separated, Linux only)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Restore GStreamer cache (Windows)
      if: runner.os == 'Windows' && inputs.gstreamer == 'true'
      id: gst-win-cache
      uses: actions/cache/restore@v5
      with:
        path: C:\gstreamer
        key: gstreamer-windows-${{ inputs.gstreamer-version || hashFiles('.github/build-config.json') }}

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      uses: nick-fields/retry@v3
      env:
        INPUT_GSTREAMER: ${{ inputs.gstreamer }}
        INPUT_GSTREAMER_VERSION: ${{ inputs.gstreamer-version }}
        INPUT_VULKAN: ${{ inputs.vulkan }}
      with:
        timeout_minutes: 10
        max_attempts: 3
        shell: python
        command: |
          import os, subprocess, sys
          args = [sys.executable, './tools/setup/install_dependencies.py', '--platform', 'windows']
          if os.environ.get('INPUT_GSTREAMER_VERSION'):
              args += ['--gstreamer-version', os.environ['INPUT_GSTREAMER_VERSION']]
          if os.environ.get('INPUT_GSTREAMER') != 'true':
              args.append('--skip-gstreamer')
          if os.environ.get('INPUT_VULKAN') == 'true':
              args.append('--vulkan')
          sys.exit(subprocess.run(args).returncode)

    - name: Save GStreamer cache (Windows)
      if: runner.os == 'Windows' && inputs.gstreamer == 'true' && github.event_name != 'pull_request' && steps.gst-win-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: C:\gstreamer
        key: ${{ steps.gst-win-cache.outputs.cache-primary-key }}

    - name: Get system package list (Linux)
      if: runner.os == 'Linux'
      id: linux-deps
      shell: bash
      run: |
        packages=$(python3 tools/setup/install_dependencies.py --platform debian --print-packages)
        echo "packages=${packages}" >> "$GITHUB_OUTPUT"

    - name: Enable universe repository (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" enable-universe

    # cache-apt-pkgs-action has no save toggle; skip it on PRs to avoid cache churn.
    - name: Cache and install apt packages (Linux, non-PR)
      if: runner.os == 'Linux' && github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        packages: ${{ steps.linux-deps.outputs.packages }}
        version: linux-deps-v2-${{ hashFiles('tools/setup/install_dependencies.py', '.github/build-config.json', '.github/actions/install-dependencies/action.yml') }}

    - name: Install apt packages (Linux, PR)
      if: runner.os == 'Linux' && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target')
      shell: bash
      env:
        APT_PACKAGES: ${{ steps.linux-deps.outputs.packages }}
      run: |
        sudo apt-get -o Acquire::Retries=3 update -qq
        # shellcheck disable=SC2086
        sudo apt-get -o Acquire::Retries=3 install -y --no-install-recommends $APT_PACKAGES

    - name: Fix apt alternatives after cache restore (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" fix-apt-alternatives

    - name: Install optional apt packages (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" install-optional

    - name: Detect Python version for pipx cache (Linux)
      if: runner.os == 'Linux'
      id: python-version
      shell: bash
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/install_dependencies_helper.py" detect-python-version

    - name: Restore pipx/pip cache (Linux)
      if: runner.os == 'Linux'
      id: pipx-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cache/pip
          ~/.local/pipx
        key: pipx-linux-v2-py${{ steps.python-version.outputs.minor }}-${{ hashFiles('tools/setup/install_dependencies.py', '.github/actions/install-dependencies/action.yml') }}
        restore-keys: |
          pipx-linux-v2-py${{ steps.python-version.outputs.minor }}-
          pipx-linux-v2-

    - name: Install pipx packages (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: python3 tools/setup/install_dependencies.py --platform debian --skip-system-packages

    - name: Save pipx/pip cache (Linux)
      if: runner.os == 'Linux' && github.event_name != 'pull_request' && steps.pipx-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: |
          ~/.cache/pip
          ~/.local/pipx
        key: ${{ steps.pipx-cache.outputs.cache-primary-key }}

    - name: Install extra packages (Linux)
      if: runner.os == 'Linux' && inputs.extra-packages != ''
      uses: nick-fields/retry@v3
      env:
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
      with:
        timeout_minutes: 5
        max_attempts: 3
        command: |
          validated="$(python3 tools/setup/install_dependencies.py --validate-extra-packages $EXTRA_PACKAGES)"
          # shellcheck disable=SC2086
          sudo apt-get install -y $validated

    - name: Restore GStreamer cache (macOS)
      if: runner.os == 'macOS'
      id: gst-mac-cache
      uses: actions/cache/restore@v5
      with:
        path: /Library/Frameworks/GStreamer.framework
        key: gstreamer-macos-${{ inputs.gstreamer-version || hashFiles('.github/build-config.json') }}

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 3
        command: |
          python3 tools/setup/install_dependencies.py --platform macos

    - name: Save GStreamer cache (macOS)
      if: runner.os == 'macOS' && github.event_name != 'pull_request' && steps.gst-mac-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: /Library/Frameworks/GStreamer.framework
        key: ${{ steps.gst-mac-cache.outputs.cache-primary-key }}
