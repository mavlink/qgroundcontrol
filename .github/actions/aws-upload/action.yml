name: AWS Upload
description: Upload release artifacts to AWS S3 and invalidate CloudFront cache

inputs:
  artifact-name:
    description: Artifact filename to upload
    required: true
  artifact-path:
    description: Path to artifact file
    required: true
  aws-key-id:
    description: AWS access key ID
    required: false
  aws-secret-access-key:
    description: AWS secret access key
    required: false
  aws-role-arn:
    description: AWS IAM role ARN for OIDC authentication (preferred over static credentials)
    required: false
  aws-distribution-id:
    description: AWS CloudFront distribution ID (optional, for cache invalidation)
    required: false
  aws-region:
    description: AWS region
    required: false
    default: 'us-west-2'
  s3-bucket:
    description: S3 bucket name
    required: false
    default: 'qgroundcontrol'

runs:
  using: composite
  steps:
    - name: Validate credentials and artifact
      shell: bash
      env:
        AWS_ROLE_ARN: ${{ inputs.aws-role-arn }}
        AWS_KEY_ID: ${{ inputs.aws-key-id }}
        AWS_SECRET_KEY: ${{ inputs.aws-secret-access-key }}
        INPUTS_ARTIFACT_PATH: ${{ inputs.artifact-path }}
        INPUTS_ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/aws_upload.py" validate \
          --role-arn "${AWS_ROLE_ARN:-}" \
          --key-id "${AWS_KEY_ID:-}" \
          --secret-key "${AWS_SECRET_KEY:-}" \
          --artifact-path "${INPUTS_ARTIFACT_PATH}" \
          --artifact-name "${INPUTS_ARTIFACT_NAME}"

    - name: Configure AWS Credentials
      uses: ./.github/actions/aws-credentials
      with:
        aws-role-arn: ${{ inputs.aws-role-arn }}
        aws-key-id: ${{ inputs.aws-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Upload to S3 builds folder
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/aws_upload.py" upload \
          --artifact-path "${INPUTS_ARTIFACT_PATH}" \
          --artifact-name "${INPUTS_ARTIFACT_NAME}" \
          --ref-name "${GITHUB_REF_NAME}" \
          --s3-bucket "${INPUTS_S3_BUCKET}"
      env:
        INPUTS_ARTIFACT_PATH: ${{ inputs.artifact-path }}
        INPUTS_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        INPUTS_S3_BUCKET: ${{ inputs.s3-bucket }}

    - name: Upload to S3 latest folder
      if: github.ref_type == 'tag'
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/aws_upload.py" upload-latest \
          --artifact-path "${INPUTS_ARTIFACT_PATH}" \
          --artifact-name "${INPUTS_ARTIFACT_NAME}" \
          --s3-bucket "${INPUTS_S3_BUCKET}"
      env:
        INPUTS_ARTIFACT_PATH: ${{ inputs.artifact-path }}
        INPUTS_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        INPUTS_S3_BUCKET: ${{ inputs.s3-bucket }}

    - name: Invalidate CloudFront cache
      if: github.ref_type == 'tag' && inputs.aws-distribution-id != ''
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/aws_upload.py" invalidate \
          --artifact-name "${INPUTS_ARTIFACT_NAME}" \
          --distribution-id "${INPUTS_AWS_DISTRIBUTION_ID}"
      env:
        INPUTS_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        INPUTS_AWS_DISTRIBUTION_ID: ${{ inputs.aws-distribution-id }}
