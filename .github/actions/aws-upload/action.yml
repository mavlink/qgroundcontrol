name: AWS Upload
description: Upload release artifacts to AWS S3 and invalidate CloudFront cache

inputs:
  artifact-name:
    description: Artifact filename to upload
    required: true
  artifact-path:
    description: Path to artifact file
    required: true
  aws-key-id:
    description: AWS access key ID
    required: false
  aws-secret-access-key:
    description: AWS secret access key
    required: false
  aws-role-arn:
    description: AWS IAM role ARN for OIDC authentication (preferred over static credentials)
    required: false
  aws-distribution-id:
    description: AWS CloudFront distribution ID (optional, for cache invalidation)
    required: false
  aws-region:
    description: AWS region
    required: false
    default: 'us-west-2'
  s3-bucket:
    description: S3 bucket name
    required: false
    default: 'qgroundcontrol'

runs:
  using: composite
  steps:
    - name: Validate credentials and artifact
      shell: bash
      env:
        AWS_ROLE_ARN: ${{ inputs.aws-role-arn }}
        AWS_KEY_ID: ${{ inputs.aws-key-id }}
        AWS_SECRET_KEY: ${{ inputs.aws-secret-access-key }}
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/aws_upload.py" validate \
          --role-arn "${AWS_ROLE_ARN:-}" \
          --key-id "${AWS_KEY_ID:-}" \
          --secret-key "${AWS_SECRET_KEY:-}" \
          --artifact-path "${{ inputs.artifact-path }}" \
          --artifact-name "${{ inputs.artifact-name }}"

    - name: Configure AWS Credentials (OIDC)
      if: inputs.aws-role-arn != ''
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Configure AWS Credentials (Static)
      if: inputs.aws-role-arn == '' && inputs.aws-key-id != ''
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ inputs.aws-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Upload to S3 builds folder
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/aws_upload.py" upload \
          --artifact-path "${{ inputs.artifact-path }}" \
          --artifact-name "${{ inputs.artifact-name }}" \
          --ref-name "${{ github.ref_name }}" \
          --s3-bucket "${{ inputs.s3-bucket }}"

    - name: Upload to S3 latest folder
      if: github.ref_type == 'tag'
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.artifact-path }}
        S3_BUCKET: ${{ inputs.s3-bucket }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        aws s3 cp "$ARTIFACT_PATH" \
          "s3://${S3_BUCKET}/latest/${ARTIFACT_NAME}" \
          --acl public-read

    - name: Invalidate CloudFront cache
      if: github.ref_type == 'tag' && inputs.aws-distribution-id != ''
      shell: bash
      env:
        DISTRIBUTION_ID: ${{ inputs.aws-distribution-id }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "$DISTRIBUTION_ID" \
          --paths "/latest/${ARTIFACT_NAME}"
