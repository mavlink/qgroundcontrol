name: Coverage Report
description: Generate and upload code coverage reports

inputs:
  build-dir:
    description: Path to CMake build directory
    required: true
  mode:
    description: 'Coverage generation mode (full: run tests + report, report-only: report from existing coverage data)'
    required: false
    default: full
  codecov-token:
    description: Codecov upload token (optional for public repos)
    required: false
    default: ''
  artifact-name:
    description: Name for coverage artifact
    required: false
    default: coverage-report
  retention-days:
    description: Days to retain coverage artifact
    required: false
    default: '14'
  flags:
    description: Codecov flags (comma-separated)
    required: false
    default: unittests
  pr-number:
    description: Pull request number to post comment (optional)
    required: false
    default: ''
  baseline-xml:
    description: Path to baseline coverage XML for comparison (optional)
    required: false
    default: ''
  comment-tag:
    description: Tag for updating existing PR comment
    required: false
    default: coverage-report

runs:
  using: composite
  steps:
    - name: Generate Coverage Report
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/tools/coverage.py" \
          --mode "${{ inputs.mode }}" \
          --build-dir "${{ inputs.build-dir }}" \
          --log-file "${{ inputs.build-dir }}/coverage-output.txt" \
          --step-summary

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ${{ inputs.build-dir }}/coverage.xml
        flags: ${{ inputs.flags }}
        name: qgc-coverage
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false
        verbose: true

    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.build-dir }}/coverage-output.txt
          ${{ inputs.build-dir }}/coverage.xml
          ${{ inputs.build-dir }}/coverage.html
          ${{ inputs.build-dir }}/coverage.*.html
        retention-days: ${{ inputs.retention-days }}

    - name: Generate PR comment
      if: inputs.pr-number != ''
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/coverage_comment.py" \
          --coverage-xml "${{ inputs.build-dir }}/coverage.xml" \
          --baseline-xml "${{ inputs.baseline-xml }}" \
          --output coverage-comment.md

    - name: Post PR comment
      if: inputs.pr-number != ''
      uses: thollander/actions-comment-pull-request@v3
      with:
        pr-number: ${{ inputs.pr-number }}
        comment-tag: ${{ inputs.comment-tag }}
        file-path: coverage-comment.md
