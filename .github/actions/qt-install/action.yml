name: Install Qt
description: Install Qt using aqtinstall with caching
outputs:
  arch_dir:
    description: Resolved Qt architecture directory name
    value: ${{ steps.qt-meta.outputs.arch_dir }}
  qt_root_dir:
    description: Absolute Qt root directory
    value: ${{ steps.qt-install.outputs.qt_root_dir || steps.qt-cached.outputs.qt_root_dir }}
  qt_bin_dir:
    description: Qt bin directory
    value: ${{ steps.qt-install.outputs.qt_bin_dir || steps.qt-cached.outputs.qt_bin_dir }}
inputs:
  version:
    description: Qt version to install
    required: true
  host:
    description: Host platform (linux, mac, windows, etc.)
    required: true
  target:
    description: Target platform (desktop, android, ios)
    required: false
    default: desktop
  arch:
    description: Architecture (linux_gcc_64, clang_64, win64_msvc2022_64, etc.)
    required: true
  dir:
    description: Installation directory
    required: false
    default: ${{ github.workspace }}/.qt
  modules:
    description: Qt modules to install (use build-config.outputs.qt_modules)
    required: false
    default: ''
  archives:
    description: Optional Qt archives subset to install (space-separated)
    required: false
    default: ''
  export-env:
    description: Export QT_ROOT_DIR and prepend the Qt bin directory to PATH
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Resolve arch directory and cache key
      id: qt-meta
      shell: bash
      env:
        QT_ARCH: ${{ inputs.arch }}
        QT_MODULES: ${{ inputs.modules }}
        QT_ARCHIVES: ${{ inputs.archives }}
      run: python3 "${GITHUB_WORKSPACE}/tools/setup/install_qt.py" cache-key --arch "${QT_ARCH}" --modules "${QT_MODULES}" --archives "${QT_ARCHIVES}"

    # Full Qt matrix is ~14 GB; only push events save to fit under the 10 GB repo cache cap.
    - name: Restore Qt cache
      id: qt-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ inputs.dir }}/Qt/${{ inputs.version }}
        # `runner.os` is implied by `inputs.host` (linux/mac/windows...) so it's omitted.
        key: qt-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.arch }}-${{ inputs.version }}-${{ steps.qt-meta.outputs.digest }}

    - name: Install Qt ${{ inputs.version }}
      if: steps.qt-cache.outputs.cache-hit != 'true'
      id: qt-install
      shell: bash
      env:
        QT_VERSION: ${{ inputs.version }}
        QT_HOST: ${{ inputs.host }}
        QT_TARGET: ${{ inputs.target }}
        QT_ARCH: ${{ inputs.arch }}
        QT_OUTDIR: ${{ inputs.dir }}/Qt
        QT_MODULES: ${{ inputs.modules }}
        QT_ARCHIVES: ${{ inputs.archives }}
      run: |
        python3 "${GITHUB_WORKSPACE}/tools/setup/install_qt.py" install \
          --version "${QT_VERSION}" \
          --host "${QT_HOST}" \
          --target "${QT_TARGET}" \
          --arch "${QT_ARCH}" \
          --outdir "${QT_OUTDIR}" \
          --modules "${QT_MODULES}" \
          --archives "${QT_ARCHIVES}"

    - name: Save Qt cache
      if: github.event_name != 'pull_request' && steps.qt-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ inputs.dir }}/Qt/${{ inputs.version }}
        key: ${{ steps.qt-cache.outputs.cache-primary-key }}

    - name: Resolve Qt paths (cache hit)
      if: steps.qt-cache.outputs.cache-hit == 'true'
      id: qt-cached
      shell: bash
      env:
        QT_OUTDIR: ${{ inputs.dir }}/Qt
        QT_VERSION: ${{ inputs.version }}
        ARCH_DIR: ${{ steps.qt-meta.outputs.arch_dir }}
      run: |
        qt_root="${QT_OUTDIR}/${QT_VERSION}/${ARCH_DIR}"
        echo "qt_root_dir=${qt_root}" >> "$GITHUB_OUTPUT"
        echo "qt_bin_dir=${qt_root}/bin" >> "$GITHUB_OUTPUT"

    - name: Set Qt environment
      if: ${{ inputs.export-env == 'true' }}
      shell: bash
      run: |
        qt_root="${{ steps.qt-install.outputs.qt_root_dir || steps.qt-cached.outputs.qt_root_dir }}"
        echo "QT_ROOT_DIR=${qt_root}" >> "$GITHUB_ENV"
        echo "${qt_root}/bin" >> "$GITHUB_PATH"
        echo "Qt installed at ${qt_root}"
