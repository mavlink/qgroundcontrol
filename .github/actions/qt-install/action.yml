name: Install Qt
description: Install Qt using aqtinstall with caching
outputs:
  arch_dir:
    description: Resolved Qt architecture directory name
    value: ${{ steps.qt-meta.outputs.arch_dir }}
  qt_root_dir:
    description: Absolute Qt root directory
    value: ${{ steps.qt-preinstalled.outputs.qt_root_dir || steps.qt-install.outputs.qt_root_dir || steps.qt-cached.outputs.qt_root_dir }}
  qt_bin_dir:
    description: Qt bin directory
    value: ${{ steps.qt-preinstalled.outputs.qt_bin_dir || steps.qt-install.outputs.qt_bin_dir || steps.qt-cached.outputs.qt_bin_dir }}
inputs:
  version:
    description: Qt version to install
    required: true
  host:
    description: Host platform (linux, mac, windows, etc.)
    required: true
  target:
    description: Target platform (desktop, android, ios)
    required: false
    default: desktop
  arch:
    description: Architecture (linux_gcc_64, clang_64, win64_msvc2022_64, etc.)
    required: true
  dir:
    description: Installation directory
    required: false
    default: ${{ github.workspace }}/.qt
  modules:
    description: Qt modules to install (use build-config.outputs.qt_modules)
    required: false
    default: ''
  archives:
    description: Optional Qt archives subset to install (space-separated)
    required: false
    default: ''
  export-env:
    description: Export QT_ROOT_DIR and prepend the Qt bin directory to PATH
    required: false
    default: 'true'
  aqt-source:
    description: >-
      Pip spec used to install aqtinstall. Empty reads qt.aqt_source from
      build-config.json and forces a reinstall so runner tools cannot drift.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Resolve arch directory and cache key
      id: qt-meta
      shell: bash
      env:
        QT_ARCH: ${{ inputs.arch }}
        QT_MODULES: ${{ inputs.modules }}
        QT_ARCHIVES: ${{ inputs.archives }}
      run: python3 "${GITHUB_WORKSPACE}/tools/setup/install_qt.py" cache-key --arch "${QT_ARCH}" --modules "${QT_MODULES}" --archives "${QT_ARCHIVES}"

    - name: Resolve preinstalled Qt
      id: qt-preinstalled
      shell: bash
      env:
        PREINSTALLED_DIR: ${{ env.QGC_PREINSTALLED_QT_DIR || '/opt/qgc-sdk' }}
        QT_VERSION: ${{ inputs.version }}
        ARCH_DIR: ${{ steps.qt-meta.outputs.arch_dir }}
      run: |
        qt_root="${PREINSTALLED_DIR}/Qt/${QT_VERSION}/${ARCH_DIR}"
        if [[ -z "${PREINSTALLED_DIR}" || ! -d "${qt_root}/bin" ]]; then
          echo "available=false" >> "${GITHUB_OUTPUT}"
          exit 0
        fi
        python3 "${GITHUB_WORKSPACE}/tools/setup/install_qt.py" resolve-paths \
          --outdir "${PREINSTALLED_DIR}/Qt" \
          --version "${QT_VERSION}" \
          --arch-dir "${ARCH_DIR}"
        echo "available=true" >> "${GITHUB_OUTPUT}"

    # Treat transient cache-service failures as cache misses.
    - name: Restore Qt cache
      id: qt-cache
      if: steps.qt-preinstalled.outputs.available != 'true'
      uses: actions/cache/restore@v6
      continue-on-error: true
      with:
        path: ${{ inputs.dir }}/Qt/${{ inputs.version }}
        key: qt-${{ inputs.host }}-${{ inputs.target }}-${{ inputs.arch }}-${{ inputs.version }}-${{ steps.qt-meta.outputs.digest }}

    - name: Install Qt ${{ inputs.version }}
      if: steps.qt-preinstalled.outputs.available != 'true' && steps.qt-cache.outputs.cache-hit != 'true'
      id: qt-install
      shell: bash
      env:
        QT_VERSION: ${{ inputs.version }}
        QT_HOST: ${{ inputs.host }}
        QT_TARGET: ${{ inputs.target }}
        QT_ARCH: ${{ inputs.arch }}
        QT_OUTDIR: ${{ inputs.dir }}/Qt
        QT_MODULES: ${{ inputs.modules }}
        QT_ARCHIVES: ${{ inputs.archives }}
        QT_AQT_SOURCE: ${{ inputs.aqt-source }}
      run: |
        if [[ -z "${QT_AQT_SOURCE}" ]]; then
          QT_AQT_SOURCE=$(python3 "${GITHUB_WORKSPACE}/tools/setup/read_config.py" --get qt.aqt_source)
        fi
        python3 "${GITHUB_WORKSPACE}/tools/setup/install_qt.py" install \
          --version "${QT_VERSION}" \
          --host "${QT_HOST}" \
          --target "${QT_TARGET}" \
          --arch "${QT_ARCH}" \
          --outdir "${QT_OUTDIR}" \
          --modules "${QT_MODULES}" \
          --archives "${QT_ARCHIVES}" \
          --aqt-source "${QT_AQT_SOURCE}"

    - name: Re-check Qt cache before save
      id: qt-presave
      if: >-
        steps.qt-preinstalled.outputs.available != 'true' &&
        steps.qt-cache.outputs.cache-hit != 'true' && inputs.target != 'ios' &&
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache/restore@v6
      continue-on-error: true
      with:
        path: ${{ inputs.dir }}/Qt/${{ inputs.version }}
        key: ${{ steps.qt-cache.outputs.cache-primary-key }}
        lookup-only: true

    - name: Save Qt cache
      if: >-
        steps.qt-preinstalled.outputs.available != 'true' &&
        steps.qt-cache.outputs.cache-hit != 'true' &&
        steps.qt-presave.outputs.cache-hit != 'true' &&
        inputs.target != 'ios' &&
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: actions/cache/save@v6
      with:
        path: ${{ inputs.dir }}/Qt/${{ inputs.version }}
        key: ${{ steps.qt-cache.outputs.cache-primary-key }}

    - name: Resolve Qt paths (cache hit)
      if: steps.qt-preinstalled.outputs.available != 'true' && steps.qt-cache.outputs.cache-hit == 'true'
      id: qt-cached
      shell: bash
      env:
        QT_OUTDIR: ${{ inputs.dir }}/Qt
        QT_VERSION: ${{ inputs.version }}
        ARCH_DIR: ${{ steps.qt-meta.outputs.arch_dir }}
      run: |
        python3 "${GITHUB_WORKSPACE}/tools/setup/install_qt.py" resolve-paths \
          --outdir "${QT_OUTDIR}" \
          --version "${QT_VERSION}" \
          --arch-dir "${ARCH_DIR}"

    - name: Set Qt environment
      if: ${{ inputs.export-env == 'true' }}
      shell: bash
      env:
        QT_ROOT: ${{ steps.qt-preinstalled.outputs.qt_root_dir || steps.qt-install.outputs.qt_root_dir || steps.qt-cached.outputs.qt_root_dir }}
      run: | # zizmor: ignore[github-env] writes trusted aqt install path (step output) to env; not attacker-controllable
        echo "QT_ROOT_DIR=${QT_ROOT}" >> "$GITHUB_ENV"
        echo "${QT_ROOT}/bin" >> "$GITHUB_PATH"
        echo "Qt installed at ${QT_ROOT}"
