name: CMake Build
description: Build QGroundControl with consistent options

inputs:
  build-dir:
    description: 'Build directory'
    required: false
    default: 'build'
  build-type:
    description: 'Build configuration (Release, Debug, RelWithDebInfo)'
    required: false
    default: 'Release'
  target:
    description: 'Build target'
    required: false
    default: 'all'
  parallel:
    description: 'Enable parallel builds'
    required: false
    default: 'true'
  parallel-jobs:
    description: 'Optional max parallel jobs when parallel is enabled'
    required: false
    default: ''
  output-file:
    description: 'File to capture build output (optional)'
    required: false
    default: ''
  continue-on-error:
    description: 'Continue even if build fails'
    required: false
    default: 'false'
  reviewdog:
    description: 'Enable reviewdog to annotate compiler warnings on PRs'
    required: false
    default: 'false'
  reviewdog-token:
    description: 'GitHub token for reviewdog (typically github.token)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Build
      shell: bash
      working-directory: ${{ inputs.build-dir }}
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        TARGET: ${{ inputs.target }}
        PARALLEL: ${{ inputs.parallel }}
        PARALLEL_JOBS: ${{ inputs.parallel-jobs }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        CONTINUE: ${{ inputs.continue-on-error }}
        REVIEWDOG: ${{ inputs.reviewdog }}
      run: |
        ARGS=(build)
        [[ -n "$TARGET" ]] && ARGS+=(--target "$TARGET")
        [[ -n "$BUILD_TYPE" ]] && ARGS+=(--build-type "$BUILD_TYPE")
        [[ "$PARALLEL" == "true" ]] && ARGS+=(--parallel)
        [[ -n "$PARALLEL_JOBS" ]] && ARGS+=(--parallel-jobs "$PARALLEL_JOBS")
        [[ -n "$OUTPUT_FILE" ]] && ARGS+=(--output-file "$OUTPUT_FILE")
        [[ "$CONTINUE" == "true" ]] && ARGS+=(--continue-on-error)
        [[ "$REVIEWDOG" == "true" ]] && ARGS+=(--reviewdog)
        python3 "${GITHUB_WORKSPACE}/.github/scripts/cmake_helper.py" "${ARGS[@]}"

    - name: Setup reviewdog
      if: inputs.reviewdog == 'true' && env.REVIEWDOG_LOG != ''
      uses: reviewdog/action-setup@v1

    - name: Annotate compiler warnings
      if: inputs.reviewdog == 'true' && env.REVIEWDOG_LOG != ''
      shell: bash
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.reviewdog-token }}
      run: |
        reviewdog \
          -f=gcc \
          -reporter=github-pr-check \
          -filter-mode=added \
          -fail-level=none \
          -name="compiler-warnings" \
          < "$REVIEWDOG_LOG" || true

    - name: Compiler Cache Stats
      if: always()
      shell: bash
      run: |
        if command -v ccache >/dev/null 2>&1; then
          python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" summary
        fi
