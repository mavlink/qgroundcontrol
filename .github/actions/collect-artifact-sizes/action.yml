name: Collect Artifact Sizes
description: Query artifact sizes from GitHub API for all platform workflow runs

inputs:
  head-sha:
    description: The commit SHA to find workflow runs for
    required: true
  workflows:
    description: Comma-separated workflow names to collect artifact sizes for
    required: false
    default: Linux,Windows,MacOS,Android
  event:
    description: Optional workflow event name to filter runs by
    required: false
    default: ''
  output-file:
    description: Output JSON file path
    required: true
    default: artifact-sizes.json
  runs-file:
    description: Path to cached workflow runs JSON (skips API call if provided)
    required: false
    default: ''
  artifacts-file:
    description: Optional path to run artifact metadata JSON (skips per-run artifact API calls)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Collect artifact sizes from API
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        QGC_GH_API_MODE: http
        GITHUB_WORKSPACE: ${{ github.workspace }}
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ inputs.head-sha }}
        WORKFLOWS: ${{ inputs.workflows }}
        EVENT: ${{ inputs.event }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        RUNS_FILE: ${{ inputs.runs-file }}
        ARTIFACTS_FILE: ${{ inputs.artifacts-file }}
      run: |
        python3 -c "
        import os, subprocess, sys
        args = ['${GITHUB_WORKSPACE}/.github/scripts/collect_artifact_sizes.py',
                '--repo', os.environ['REPO'],
                '--head-sha', os.environ['HEAD_SHA'],
                '--platform-workflows', os.environ['WORKFLOWS'],
                '--output-file', os.environ['OUTPUT_FILE']]
        event = os.environ.get('EVENT', '')
        if event:
            args += ['--event', event]
        runs = os.environ.get('RUNS_FILE', '')
        if runs and os.path.isfile(runs):
            args += ['--runs-file', runs]
        artifacts = os.environ.get('ARTIFACTS_FILE', '')
        if artifacts and os.path.isfile(artifacts):
            args += ['--artifacts-file', artifacts]
        sys.exit(subprocess.run([sys.executable] + args).returncode)
        "
