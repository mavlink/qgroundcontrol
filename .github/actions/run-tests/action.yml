name: Run Qt Tests
description: Run QGroundControl unit tests with proper display handling

inputs:
  binary-path:
    description: 'Path to QGroundControl binary (auto-detected if not specified)'
    required: false
  build-dir:
    description: 'Build directory (for auto-detection)'
    required: false
    default: 'build'
  build-type:
    description: 'Build type for binary location'
    required: false
    default: 'Debug'
  output-file:
    description: 'JUnit XML output file'
    required: false
    default: 'junit-results.xml'
  log-file:
    description: 'Test output log file'
    required: false
    default: 'test-output.txt'
  test-filter:
    description: 'Test filter (passed to --unittest:FILTER)'
    required: false
    default: ''
  timeout:
    description: 'Test timeout in seconds'
    required: false
    default: '300'
  platform:
    description: 'Qt platform plugin (offscreen for headless)'
    required: false
    default: 'offscreen'

outputs:
  exit_code:
    description: 'Test exit code'
    value: ${{ steps.run.outputs.exit_code }}
  passed:
    description: 'Whether tests passed (true/false)'
    value: ${{ steps.run.outputs.passed }}
  output_file:
    description: 'Path to JUnit XML output'
    value: ${{ steps.run.outputs.output_file }}
  log_file:
    description: 'Path to test log'
    value: ${{ steps.run.outputs.log_file }}

runs:
  using: composite
  steps:
    - name: Find binary
      id: find
      if: inputs.binary-path == ''
      shell: bash
      run: |
        "${{ github.workspace }}/.github/scripts/find-binary.sh" \
          --build-dir "${{ inputs.build-dir }}" \
          --build-type "${{ inputs.build-type }}"

    - name: Run tests
      id: run
      shell: bash
      env:
        INPUT_TEST_FILTER: ${{ inputs.test-filter }}
      run: |
        # Determine binary path
        if [[ -n "${{ inputs.binary-path }}" ]]; then
          binary="${{ inputs.binary-path }}"
        else
          binary="${{ steps.find.outputs.binary_path }}"
        fi

        if [[ ! -f "$binary" ]]; then
          echo "::error::Binary not found: $binary"
          exit 1
        fi

        chmod +x "$binary"

        # Determine output directory
        output_dir=$(dirname "$binary")
        output_file="$output_dir/${{ inputs.output-file }}"
        log_file="$output_dir/${{ inputs.log-file }}"

        echo "output_file=$output_file" >> "$GITHUB_OUTPUT"
        echo "log_file=$log_file" >> "$GITHUB_OUTPUT"

        # Build test command
        test_args=(--unittest)
        [[ -n "$INPUT_TEST_FILTER" ]] && test_args=("--unittest:${INPUT_TEST_FILTER}")
        test_args+=(--unittest-output "$output_file")

        # Set Qt platform
        export QT_QPA_PLATFORM="${{ inputs.platform }}"

        # Run tests with display handling
        set +e
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          # Use xvfb-run for virtual framebuffer on Linux
          timeout ${{ inputs.timeout }} xvfb-run -a "$binary" "${test_args[@]}" 2>&1 | tee "$log_file"
        else
          # Direct execution on other platforms
          timeout ${{ inputs.timeout }} "$binary" "${test_args[@]}" 2>&1 | tee "$log_file"
        fi
        TEST_EXIT_CODE=${PIPESTATUS[0]}
        set -e

        echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"

        if [[ "$TEST_EXIT_CODE" -eq 0 ]]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
          echo "✅ Tests passed"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
          echo "❌ Tests failed with exit code $TEST_EXIT_CODE"
        fi

        exit "$TEST_EXIT_CODE"
