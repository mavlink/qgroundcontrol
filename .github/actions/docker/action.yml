name: Docker Build
description: Build QGC using Docker

inputs:
  dockerfile:
    description: Dockerfile to use
    required: false
    default: 'Dockerfile-build-ubuntu'
  build-type:
    description: CMake build type (Release or Debug)
    required: false
    default: 'Release'
  fuse:
    description: Enable FUSE support (required for AppImage builds)
    required: false
    default: 'false'
  docker-username:
    description: Docker Hub username
    required: false
    default: 'mavlink'
  docker-token:
    description: Docker Hub token
    required: false
    default: ''

runs:
  using: composite
  steps:
    # - name: Set up QEMU
    #   uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: inputs.docker-token != ''
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.docker-username }}
        password: ${{ inputs.docker-token }}

    - name: Validate inputs
      shell: bash
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/docker_helper.py" validate \
          --dockerfile "${{ inputs.dockerfile }}" \
          --build-type "${{ inputs.build-type }}"

    - name: Build Docker image
      if: contains(fromJSON('["Dockerfile-build-ubuntu", "Dockerfile-build-android"]'), inputs.dockerfile)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./deploy/docker/${{ inputs.dockerfile }}
        tags: qgc-builder:latest
        load: true
        cache-from: type=gha,scope=${{ inputs.dockerfile }}
        cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,mode=max,scope={0}', inputs.dockerfile) || '' }}

    - name: Run Docker build
      if: contains(fromJSON('["Release", "Debug"]'), inputs.build-type)
      shell: bash
      env:
        ENABLE_FUSE: ${{ inputs.fuse }}
      run: |
        chmod +x ./deploy/docker/docker-run.sh
        ARGS=(run --build-type "${{ inputs.build-type }}")
        [[ "$ENABLE_FUSE" == "true" ]] && ARGS+=(--fuse)
        python3 "${GITHUB_WORKSPACE}/.github/scripts/docker_helper.py" "${ARGS[@]}"
