name: Docker Build
description: Build QGC using Docker

inputs:
  target:
    description: Dockerfile build stage to target (linux, linux-cross, android)
    required: false
    default: 'linux'
  variant:
    description: Variant key for cache namespace + image tag suffix (e.g. linux, linux-2204)
    required: false
    default: 'linux'
  build-args:
    description: Newline-separated KEY=VALUE docker build args (e.g. BASE_REF=...)
    required: false
    default: ''
  build-type:
    description: CMake build type (Release or Debug)
    required: false
    default: 'Release'
  fuse:
    description: Enable FUSE support for AppImageLint target mounting
    required: false
    default: 'false'
  docker-username:
    description: Docker Hub username
    required: false
    default: ''
  docker-token:
    description: Docker Hub token
    required: false
    default: ''
  github-token:
    description: GitHub token used to publish GHCR images
    required: false
    default: ''
  push-image:
    description: "Image reference (e.g. dronecode/qgroundcontrol) to push the builder to. Empty = don't push."
    required: false
    default: ''

outputs:
  image-digest:
    description: Digest of the built image
    value: ${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        cache-image: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to GHCR
      if: startsWith(inputs.push-image, 'ghcr.io/') && inputs.github-token != ''
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Login to Docker Hub
      if: inputs.push-image != '' && !startsWith(inputs.push-image, 'ghcr.io/') && inputs.docker-token != '' && inputs.docker-username != ''
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.docker-username }}
        password: ${{ inputs.docker-token }}

    - name: Validate inputs
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        BUILD_TYPE: ${{ inputs.build-type }}
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/docker_helper.py" validate \
          --target "${TARGET}" \
          --build-type "${BUILD_TYPE}"

    - name: Resolve cache policy
      id: cache-policy
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        THIS_REPO: ${{ github.repository }}
      run: python3 "${GITHUB_WORKSPACE}/.github/scripts/cache_policy.py" --requested auto

    - name: Determine cache scope
      id: cache-scope
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: >-
        python3 "${GITHUB_WORKSPACE}/.github/scripts/ccache_helper.py" scope
        --event-name "${EVENT_NAME}"
        --ref-name "${REF_NAME}"
        --pr-number "${PR_NUMBER:-}"

    - name: Restore compiler cache (read/write)
      if: steps.cache-policy.outputs.save == 'true'
      uses: actions/cache@v6
      with:
        path: ${{ github.workspace }}/.ccache
        key: >-
          docker-ccache-${{ inputs.variant }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-${{
          hashFiles('.github/build-config.json', 'tools/configs/ccache.conf') }}
        restore-keys: |
          docker-ccache-${{ inputs.variant }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-
          docker-ccache-${{ inputs.variant }}-${{ inputs.build-type }}-shared-

    - name: Restore compiler cache (read-only)
      if: steps.cache-policy.outputs.save != 'true'
      uses: actions/cache/restore@v6
      with:
        path: ${{ github.workspace }}/.ccache
        key: >-
          docker-ccache-${{ inputs.variant }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-${{
          hashFiles('.github/build-config.json', 'tools/configs/ccache.conf') }}
        restore-keys: |
          docker-ccache-${{ inputs.variant }}-${{ inputs.build-type }}-${{ steps.cache-scope.outputs.scope }}-
          docker-ccache-${{ inputs.variant }}-${{ inputs.build-type }}-shared-

    - name: Docker metadata (tags + OCI labels)
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ inputs.push-image || 'dronecode/qgroundcontrol' }}
        flavor: latest=false
        tags: |
          type=raw,value=${{ inputs.variant }}
          type=sha,prefix=${{ inputs.variant }}-,format=short,enable=${{ inputs.push-image != '' }}

    - name: Build Docker image
      id: build
      if: contains(fromJSON('["linux", "linux-cross", "android"]'), inputs.target)
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./deploy/docker/Dockerfile
        target: ${{ inputs.target }}
        build-args: ${{ inputs.build-args }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # The following step runs the image locally even when it is also pushed.
        load: true
        push: ${{ inputs.push-image != '' }}
        # Avoid the OCI attestation manifest that renders as unknown/unknown on Docker Hub.
        provenance: false
        sbom: false
        cache-from: >-
          ${{ env.RUNS_ON_S3_BUCKET_CACHE != '' &&
          format('type=s3,bucket={0},region={1},blobs_prefix={2}/buildkit/blobs/,manifests_prefix={2}/buildkit/{3}/',
          env.RUNS_ON_S3_BUCKET_CACHE, env.RUNS_ON_AWS_REGION, env.RUNS_ON_S3_CACHE_REPO_PREFIX, inputs.variant) ||
          format('type=gha,scope={0}', inputs.variant) }}
        cache-to: >-
          ${{ steps.cache-policy.outputs.save == 'true' &&
          (env.RUNS_ON_S3_BUCKET_CACHE != '' &&
          format('type=s3,bucket={0},region={1},blobs_prefix={2}/buildkit/blobs/,manifests_prefix={2}/buildkit/{3}/,mode=max',
          env.RUNS_ON_S3_BUCKET_CACHE, env.RUNS_ON_AWS_REGION, env.RUNS_ON_S3_CACHE_REPO_PREFIX, inputs.variant) ||
          format('type=gha,scope={0},mode=max', inputs.variant)) || '' }}

    - name: Re-tag pushed image for local run
      if: inputs.push-image != ''
      shell: bash
      env:
        PUSH_IMAGE: ${{ inputs.push-image }}
        VARIANT: ${{ inputs.variant }}
      run: docker tag "${PUSH_IMAGE}:${VARIANT}" "dronecode/qgroundcontrol:${VARIANT}"

    - name: Run Docker build
      if: contains(fromJSON('["Release", "Debug"]'), inputs.build-type)
      shell: bash
      env:
        ENABLE_FUSE: ${{ inputs.fuse }}
        IMAGE: dronecode/qgroundcontrol:${{ inputs.variant }}
        BUILD_TYPE: ${{ inputs.build-type }}
      run: |
        chmod +x ./deploy/docker/_docker-exec.sh
        ARGS=(run --image "$IMAGE" --build-type "$BUILD_TYPE")
        [[ "$ENABLE_FUSE" == "true" ]] && ARGS+=(--fuse)
        python3 "${GITHUB_WORKSPACE}/.github/scripts/docker_helper.py" "${ARGS[@]}"

    - name: Show compiler cache statistics
      if: always()
      shell: bash
      env:
        IMAGE: dronecode/qgroundcontrol:${{ inputs.variant }}
      run: |
        if [[ -d "${GITHUB_WORKSPACE}/.ccache" ]] && docker image inspect "${IMAGE}" >/dev/null 2>&1; then
          docker run --rm --entrypoint /bin/bash \
            -v "${GITHUB_WORKSPACE}/.ccache:/ccache" \
            "${IMAGE}" \
            -c 'CCACHE_DIR=/ccache ccache --show-stats'
        fi
