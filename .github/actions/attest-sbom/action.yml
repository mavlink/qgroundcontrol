name: Attest Build with SBOM
description: Generate SBOM and attest build provenance with SBOM

inputs:
  subject-path:
    description: "Path to the artifact to attest"
    required: true
  subject-name:
    description: "Name for the SBOM artifact (without extension)"
    required: true
  scan-path:
    description: "Path to scan for SBOM (defaults to subject-path parent directory)"
    required: false
    default: ""
  sbom-format:
    description: "SBOM format (spdx-json or cyclonedx-json)"
    required: false
    default: "spdx-json"

outputs:
  sbom-path:
    description: "Path to generated SBOM file"
    value: ${{ steps.sbom.outputs.sbom-path }}

runs:
  using: composite
  steps:
    - name: Check attestation conditions and resolve paths
      id: check
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        THIS_REPO: ${{ github.repository }}
        INPUTS_SUBJECT_PATH: ${{ inputs.subject-path }}
        INPUTS_SUBJECT_NAME: ${{ inputs.subject-name }}
        INPUTS_SCAN_PATH: ${{ inputs.scan-path }}
        INPUTS_SBOM_FORMAT: ${{ inputs.sbom-format }}
      run: |
        python3 "${GITHUB_WORKSPACE}/.github/scripts/attest_helper.py" check \
          --subject-path "${INPUTS_SUBJECT_PATH}" \
          --subject-name "${INPUTS_SUBJECT_NAME}" \
          --scan-path "${INPUTS_SCAN_PATH}" \
          --sbom-format "${INPUTS_SBOM_FORMAT}" \
          --runner-temp "${{ runner.temp }}"

    - name: Generate SBOM
      id: sbom
      if: steps.check.outputs.skip != 'true'
      uses: anchore/sbom-action@v0
      with:
        path: ${{ steps.check.outputs.scan-path }}
        format: ${{ inputs.sbom-format }}
        output-file: ${{ steps.check.outputs.sbom-path }}
        upload-artifact: true
        upload-artifact-retention: 30
        artifact-name: sbom-${{ inputs.subject-name }}

    - name: Attest Build Provenance
      if: steps.check.outputs.skip != 'true'
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: ${{ inputs.subject-path }}

    - name: Attest SBOM
      if: steps.check.outputs.skip != 'true'
      # actions/attest-sbom is deprecated (a wrapper since v4); upstream advises
      # migrating to actions/attest, which derives SBOM mode from sbom-path.
      # All existing inputs are interface-compatible — no caller changes needed.
      uses: actions/attest@v4
      with:
        subject-path: ${{ inputs.subject-path }}
        sbom-path: ${{ steps.check.outputs.sbom-path }}
