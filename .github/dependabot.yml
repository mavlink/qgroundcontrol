# Dependabot owns workflow actions; Renovate owns npm, Python, pre-commit, and
# composite actions because Dependabot does not scan nested action.yml files.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]
