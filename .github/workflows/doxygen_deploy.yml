name: Doxygen API Docs

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  BRANCH_NAME: ${{ github.ref_name }}

concurrency:
  group: doxygen-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Doxygen and Graphviz
        uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: doxygen graphviz
          version: doxygen-deps-v1

      - name: Build Doxygen docs
        run: doxygen Doxyfile

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: doxygen_build
          path: docs/api/html/
          retention-days: 1

  deploy:
    if: github.repository_owner == 'mavlink'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions
            .github/scripts

      - name: Deploy docs
        uses: ./.github/actions/deploy-docs
        with:
          artifact-name: doxygen_build
          target-repo: mavlink/api.qgroundcontrol.com
          target-branch: main
          deploy-token: ${{ secrets.PX4BUILDBOT_ACCESSTOKEN }}
          source-branch: ${{ env.BRANCH_NAME }}
          commit-message: 'QGC Doxygen API docs update'
