name: CI Scripts

on:
  pull_request:
    paths:
      - '.github/scripts/**'
      - '.github/actions/**'
      - '.github/workflows/**'
      - '.github/build-config.json'
      - 'tools/setup/**'
      - 'tools/*.py'
      - 'tools/uv.lock'
      - 'tools/tests/**'
      - 'tools/common/**'
      - 'tools/generators/**'
      - 'tools/analyzers/**'
      - 'tools/locators/**'
      - 'tools/log-analyzer/**'
      - 'tools/lsp/**'
      - 'tools/simulation/**'
      - 'tools/translations/**'
  push:
    branches:
      - master
      - 'Stable*'
    paths:
      - '.github/scripts/**'
      - '.github/actions/**'
      - '.github/workflows/**'
      - '.github/build-config.json'
      - 'tools/setup/**'
      - 'tools/*.py'
      - 'tools/uv.lock'
      - 'tools/tests/**'
      - 'tools/common/**'
      - 'tools/generators/**'
      - 'tools/analyzers/**'
      - 'tools/locators/**'
      - 'tools/log-analyzer/**'
      - 'tools/lsp/**'
      - 'tools/simulation/**'
      - 'tools/translations/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  checks: write

jobs:
  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/.actionlint.yml
            .github/workflows
            .github/actions
            .github/scripts
            tools/setup
            tools/pyproject.toml
            tools/uv.lock
          sparse-checkout-cone-mode: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          actionlint_flags: -config-file .github/.actionlint.yml
          reporter: github-pr-check
          filter_mode: added
          fail_level: warning
          level: warning

  test-ci-scripts:
    name: Test CI Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/actions/setup-python
            .github/scripts
            tools/setup
            tools/pyproject.toml
            tools/uv.lock
            tools/_bootstrap.py
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          groups: scripts,test
          python-version: '3.12'

      - name: Python syntax smoke test
        run: python3 -m compileall .github/scripts

      - name: Run CI script tests
        run: |
          echo "=== CI Scripts Test Runner ==="
          cd .github/scripts
          
          # Run pytest, capturing result to avoid workflow failure (tests are optional for now)
          python3 -m pytest tests/ -v --tb=short; exit 0
          echo "Test complete"
