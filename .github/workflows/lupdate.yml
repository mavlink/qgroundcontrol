name: Update Translations

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: 'lupdate'
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-translations:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Get build config
        id: config
        uses: ./.github/actions/build-config

      - name: Install Qt for Linux
        uses: ./.github/actions/qt-install
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: linux
          arch: linux_gcc_64
          modules: qttools

      - name: Update translation files
        run: ./tools/translations/qgc-lupdate.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-translations-${{ github.run_id }}
          title: "chore: update translations"
          commit-message: "chore: update translations"
          body: |
            This PR was automatically generated by GitHub Actions to update the Qt `.ts` translation files.
