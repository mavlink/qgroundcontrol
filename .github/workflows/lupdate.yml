name: Update Translations

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: 'lupdate'
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-translations:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Get build config
        id: config
        uses: ./.github/actions/build-config

      - name: Install Qt for Linux
        uses: ./.github/actions/qt-install
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: linux
          arch: linux_gcc_64
          modules: qttools

      - name: Update translation files
        run: ./tools/translations/qgc-lupdate.sh

      - name: Commit and open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No translation changes detected — nothing to do"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B update-translations
          git add -A
          git commit -m "chore: update translations"
          git push --force origin update-translations

          # Open a PR only if one is not already open for this branch
          if ! gh pr view update-translations --json state -q .state 2>/dev/null | grep -qi open; then
            gh pr create \
              --title "chore: update translations" \
              --body "Automated weekly update of Qt \`.ts\` translation files." \
              --base master \
              --head update-translations
          else
            echo "PR already open for update-translations — branch updated in place"
          fi
