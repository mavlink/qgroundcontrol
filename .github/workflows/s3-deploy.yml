name: S3 Build & Deploy

# Builds Android APK and Windows installer on push to master,
# then uploads directly to S3-compatible storage.
# Use workflow_dispatch to trigger manually on any branch.

on:
  push:
    branches:
      - master
      - 'Stable*'
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (informational only)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Android APK  (built on Linux)
  # ──────────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PACKAGE: QGroundControl
      QT_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/deploy/android/android_release.keystore
      QT_ANDROID_KEYSTORE_ALIAS: QGCAndroidKeyStore
      QT_ANDROID_KEYSTORE_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      QT_ANDROID_KEYSTORE_KEY_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      QT_ANDROID_ABIS: arm64-v8a

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get build config
        id: config
        uses: ./.github/actions/build-config

      - name: Initial Setup
        uses: ./.github/actions/common

      - name: Install host build dependencies
        uses: ./.github/actions/install-dependencies

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Install Qt for Android
        id: qt-android
        uses: ./.github/actions/qt-android
        with:
          host: linux
          arch: linux_gcc_64
          version: ${{ steps.config.outputs.qt_version }}
          modules: ${{ steps.config.outputs.qt_modules }}
          abis: ${{ env.QT_ANDROID_ABIS }}
          build-type: Release
          cpm-modules: ${{ runner.temp }}/build/cpm_modules
          ndk-full-version: ${{ steps.config.outputs.ndk_full_version }}
          java-version: ${{ steps.config.outputs.java_version }}
          android-platform: ${{ steps.config.outputs.android_platform }}
          android-cmdline-tools: ${{ steps.config.outputs.android_cmdline_tools }}
          android-build-tools: ${{ steps.config.outputs.android_build_tools }}

      - name: Create Debug Keystore
        if: ${{ env.QT_ANDROID_KEYSTORE_STORE_PASS == '' }}
        shell: bash
        run: |
          keytool -genkey -v \
            -keystore "${RUNNER_TEMP}/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          {
            echo "QT_ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/debug.keystore"
            echo "QT_ANDROID_KEYSTORE_ALIAS=androiddebugkey"
            echo "QT_ANDROID_KEYSTORE_STORE_PASS=android"
            echo "QT_ANDROID_KEYSTORE_KEY_PASS=android"
          } >> "$GITHUB_ENV"

      - name: Configure
        uses: ./.github/actions/cmake-configure
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: Release
          stable: 'false'
          use-qt-cmake: 'false'
          extra-args: >-
            -DCMAKE_WARN_DEPRECATED=FALSE
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.qt-android.outputs.target_qt_root_dir }}/lib/cmake/Qt6/qt.toolchain.cmake
            -DCMAKE_PREFIX_PATH=${{ steps.qt-android.outputs.target_qt_root_dir }}
            -DQT_ANDROID_ABIS=${{ env.QT_ANDROID_ABIS }}
            -DQT_HOST_PATH=${{ steps.qt-android.outputs.host_qt_root_dir }}
            -DQT_ANDROID_SIGN_APK=ON

      - name: Build
        uses: ./.github/actions/cmake-build
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: Release

      - name: Prepare APK
        shell: bash
        run: |
          APK_DIR="${RUNNER_TEMP}/build/android-build"
          if ! ls "${APK_DIR}"/*.apk 1>/dev/null 2>&1; then
            echo "::error::No APK files found in ${APK_DIR}"
            ls -la "${APK_DIR}" 2>/dev/null || true
            exit 1
          fi
          cp "${APK_DIR}"/*.apk "${RUNNER_TEMP}/build/${PACKAGE}.apk"
          echo "APK ready: ${RUNNER_TEMP}/build/${PACKAGE}.apk"

      - name: Upload APK to S3
        uses: ./.github/actions/s3-upload
        with:
          artifact-path: ${{ runner.temp }}/build/${{ env.PACKAGE }}.apk
          artifact-name: ${{ env.PACKAGE }}.apk
          s3-endpoint: https://s3.twcstorage.ru
          s3-bucket: qgroundcontroll-cicd
          s3-access-key: ${{ secrets.S3_ACCESS_KEY }}
          s3-secret-key: ${{ secrets.S3_SECRET_KEY }}

  # ──────────────────────────────────────────────────────────────
  # Windows Installer EXE  (built on windows-2022 / AMD64)
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-2022
    timeout-minutes: 120

    defaults:
      run:
        shell: cmd

    env:
      PACKAGE: QGroundControl-installer-AMD64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build Setup
        id: build-setup
        uses: ./.github/actions/build-setup
        with:
          qt-host: windows
          qt-arch: win64_msvc2022_64
          build-type: Release

      - name: Set up MSVC environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Configure
        uses: ./.github/actions/cmake-configure
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: Release
          stable: 'false'
          extra-args: -DQGC_ENABLE_GST_VIDEOSTREAMING=ON

      - name: Add GStreamer to PATH
        shell: pwsh
        run: |
          $cacheFile = "${{ runner.temp }}\build\CMakeCache.txt"
          $match = Select-String -Path $cacheFile -Pattern '^GStreamer_ROOT_DIR:.*=(.+)$'
          if (-not $match) {
            Write-Error "GStreamer_ROOT_DIR not found in CMakeCache.txt"
            exit 1
          }
          $rootDir = $match.Matches[0].Groups[1].Value
          "$rootDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build
        uses: ./.github/actions/cmake-build
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: Release

      - name: Create Installer
        working-directory: ${{ runner.temp }}\build
        run: cmake --install . --config Release

      - name: Find and rename installer
        shell: pwsh
        run: |
          $buildDir = "${{ runner.temp }}\build"
          $installerExe = Get-ChildItem -Path $buildDir -Filter "*installer*.exe" | Select-Object -First 1
          if (-not $installerExe) {
            Write-Error "Installer .exe not found in $buildDir"
            Get-ChildItem -Path $buildDir | Select-Object Name
            exit 1
          }
          $dest = Join-Path $buildDir "${{ env.PACKAGE }}.exe"
          Copy-Item $installerExe.FullName $dest
          Write-Host "Installer ready: $dest"

      - name: Upload EXE to S3
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          SAFE_REF=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          S3_KEY="builds/${SAFE_REF}/${{ env.PACKAGE }}.exe"
          echo "Uploading to s3://qgroundcontroll-cicd/${S3_KEY}"
          aws s3 cp "${RUNNER_TEMP}/build/${{ env.PACKAGE }}.exe" \
            "s3://qgroundcontroll-cicd/${S3_KEY}" \
            --endpoint-url "https://s3.twcstorage.ru" \
            --no-progress
