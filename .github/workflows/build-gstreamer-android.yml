name: Build GStreamer Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'GStreamer version (tag)'
        required: false
        default: ''
        type: string
      arch:
        description: 'Target architecture'
        required: true
        default: 'universal'
        type: choice
        options:
          - universal
          - arm64
          - armv7
          - x86_64
          - x86
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug
      upload_s3:
        description: 'Upload to S3'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.arch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build GStreamer Android ${{ inputs.arch }}
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/build-config.json
            tools/setup/gstreamer/build-gstreamer-android.sh
            tools/setup/read-config.sh

      - name: Read build config
        id: config
        run: |
          version='${{ inputs.version }}'
          if [[ -z "$version" ]]; then
              version=$(jq -r '.gstreamer_version' .github/build-config.json)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip git autoconf automake libtool \
            pkg-config gettext bison flex cmake ninja-build

      - name: Build GStreamer
        id: build
        run: |
          chmod +x tools/setup/gstreamer/build-gstreamer-android.sh
          ./tools/setup/gstreamer/build-gstreamer-android.sh \
            --version '${{ steps.config.outputs.version }}' \
            --arch '${{ inputs.arch }}' \
            --type '${{ inputs.build_type }}' \
            --output '${{ runner.temp }}/output' \
            --clean

      - name: Verify build
        run: |
          echo "=== Build output ==="
          ls -la '${{ runner.temp }}/output/' || echo "No output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gstreamer-1.0-android-${{ inputs.arch }}-${{ steps.config.outputs.version }}
          path: ${{ runner.temp }}/output/*.tar.*
          retention-days: 30

      - name: Upload to S3
        if: inputs.upload_s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          version='${{ steps.config.outputs.version }}'
          s3_path="s3://qgroundcontrol/dependencies/gstreamer/android/$version"

          for archive in '${{ runner.temp }}/output'/*.tar.*; do
            [[ -f "$archive" ]] && aws s3 cp "$archive" "$s3_path/$(basename "$archive")" --acl public-read
          done

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## GStreamer Android Build Complete

          | Property | Value |
          |----------|-------|
          | Version | ${{ steps.config.outputs.version }} |
          | Architecture | ${{ inputs.arch }} |
          | S3 Path | dependencies/gstreamer/android/${{ steps.config.outputs.version }}/ |
          EOF
