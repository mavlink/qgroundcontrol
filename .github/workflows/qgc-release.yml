name: QGC Release

on:
  pull_request:
    types: [closed]
    branches:
      - 'CrownEagle/qgc_build_v5.0.8'
  workflow_dispatch:

env:
  QT_VERSION: 6.8.3
  QT_MODULES: >-
    qtcharts qtlocation qtpositioning qtspeech qt5compat qtmultimedia
    qtserialport qtimageformats qtshadertools qtconnectivity qtquick3d qtsensors qtquicktimeline

jobs:
  setup:
    name: Compute version and release notes
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    outputs:
      version: ${{ steps.compute.outputs.version }}
      notes: ${{ steps.compute.outputs.notes }}

    steps:
      - name: Compute version and notes
        id: compute
        run: |
          BASE=$(echo '${{ github.base_ref || github.ref_name }}' | grep -oP 'v[\d.]+' | head -1)
          BASE=${BASE:-dev}
          echo "version=${BASE}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "notes=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          else
            echo "notes=Manual release build" >> "$GITHUB_OUTPUT"
          fi

  build-appimage:
    name: AppImage (Linux AMD64)
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Clone ce_lcp build scripts
        run: |
          git clone https://oauth2:${{ secrets.GITLAB_ACCESS_TOKEN }}@gitlab.com/achau3910/ce_lcp.git \
            "${{ github.workspace }}/../ce_lcp"

      - name: Initial Setup
        uses: ./.github/actions/common

      - name: Install system dependencies
        run: |
          chmod a+x ./tools/setup/install-dependencies-debian.sh
          sudo ./tools/setup/install-dependencies-debian.sh

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          dir: ${{ runner.temp }}
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Build and package AppImage
        working-directory: ${{ github.workspace }}/../ce_lcp/qgc-interface
        run: bash package_release.sh --skip-upload --version=${{ needs.setup.outputs.version }}
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: ${{ runner.workspace }}/ce_lcp/qgc-interface/release-packages/*.AppImage
          if-no-files-found: error

  # TODO: Linux ARM64 AppImage
  # Add a build-appimage-arm job for team members running Linux ARM64 (e.g. Apple Silicon
  # Macs with a Linux VM) so they can download a pre-built binary without building locally.
  #
  # Blocked by: Qt 6.8.3 does not distribute pre-built Linux ARM64 packages via aqt
  # (the tool used by jurplel/install-qt-action), so Qt must be built from source.
  #
  # Recommended approach:
  #   - runs-on: ubuntu-22.04-arm (GitHub-hosted ARM64 runner, free for public repos)
  #   - Use actions/cache keyed on Qt version to store the built Qt installation
  #   - On cache miss: download qt-everywhere-src-6.8.3.tar.xz, configure with only the
  #     modules QGC needs (see QT_MODULES env var above), build and install to /opt/Qt/6.8.3
  #   - First run ~2 hours to build Qt; all subsequent runs hit the cache and are fast
  #   - Set QT_ROOT=/opt/Qt/6.8.3/gcc_arm64 before running package_release.sh
  #   - package_release.sh already uses linuxdeploy (not linuxdeployqt) which supports ARM64

  build-dmg:
    name: DMG (macOS ARM)
    runs-on: macos-latest
    needs: setup

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Clone ce_lcp build scripts
        run: |
          git clone https://oauth2:${{ secrets.GITLAB_ACCESS_TOKEN }}@gitlab.com/achau3910/ce_lcp.git \
            "${{ github.workspace }}/../ce_lcp"

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '<=16.x'

      - name: Initial Setup
        uses: ./.github/actions/common

      - name: Install system dependencies
        working-directory: ${{ github.workspace }}/tools/setup
        run: sh install-dependencies-osx.sh

      - name: Install GStreamer
        run: |
          set -e
          GST_VERSION=1.28.2
          GST_URL=https://gstreamer.freedesktop.org/data/pkg/osx/${GST_VERSION}
          curl -fL "${GST_URL}/gstreamer-1.0-${GST_VERSION}-universal.pkg" -o /tmp/gst.pkg
          curl -fL "${GST_URL}/gstreamer-1.0-devel-${GST_VERSION}-universal.pkg" -o /tmp/gst-devel.pkg
          sudo installer -pkg /tmp/gst.pkg -target /
          sudo installer -pkg /tmp/gst-devel.pkg -target /

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          dir: ${{ runner.temp }}
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Build and package DMG
        working-directory: ${{ github.workspace }}/../ce_lcp/qgc-interface
        run: bash package_release.sh --skip-upload --version=${{ needs.setup.outputs.version }}
        env:
          QT_ROOT: ${{ env.QT_ROOT_DIR }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: ${{ runner.workspace }}/ce_lcp/qgc-interface/release-packages/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [setup, build-appimage, build-dmg]
    if: github.event_name != 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --title "QGroundControl $VERSION" \
            --notes "$NOTES" \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
          NOTES: ${{ needs.setup.outputs.notes }}
