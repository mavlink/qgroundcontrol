name: Detect Changes

on:
  workflow_call:
    inputs:
      platform:
        description: 'Space-separated platform(s) to detect changes for'
        required: true
        type: string
    outputs:
      should_build:
        description: 'Whether the caller should proceed with a build (true on non-PR events)'
        value: ${{ jobs.detect.outputs.should_build }}
      linux:
        description: 'Whether Linux-relevant files changed (true on non-PR events)'
        value: ${{ jobs.detect.outputs.linux }}
      windows:
        description: 'Whether Windows-relevant files changed (true on non-PR events)'
        value: ${{ jobs.detect.outputs.windows }}
      macos:
        description: 'Whether macOS-relevant files changed (true on non-PR events)'
        value: ${{ jobs.detect.outputs.macos }}
      android:
        description: 'Whether Android-relevant files changed (true on non-PR events)'
        value: ${{ jobs.detect.outputs.android }}
      docker_linux:
        description: 'Whether Docker-Linux build inputs changed (true on non-PR events)'
        value: ${{ jobs.detect.outputs.docker_linux }}
      docker_android:
        description: 'Whether Docker-Android build inputs changed (true on non-PR events)'
        value: ${{ jobs.detect.outputs.docker_android }}

concurrency:
  # Scope per caller+platform: multiple platform workflows call this in parallel
  # for the same ref; a shared group would let GitHub cancel all but one.
  group: detect-changes-${{ inputs.platform }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.nonpr.outputs.should_build || steps.pr.outputs.should_build }}
      linux: ${{ steps.nonpr.outputs.linux || steps.pr.outputs.linux }}
      windows: ${{ steps.nonpr.outputs.windows || steps.pr.outputs.windows }}
      macos: ${{ steps.nonpr.outputs.macos || steps.pr.outputs.macos }}
      android: ${{ steps.nonpr.outputs.android || steps.pr.outputs.android }}
      docker_linux: ${{ steps.nonpr.outputs.docker_linux || steps.pr.outputs.docker_linux }}
      docker_android: ${{ steps.nonpr.outputs.docker_android || steps.pr.outputs.docker_android }}
    steps:
      # Non-PR events (push, merge_group, workflow_dispatch) always rebuild
      # everything. Sparse-checkout just the script + bootstrap shim it needs.
      - name: Checkout passthrough script (non-PR)
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/scripts/detect_changes.py
            .github/scripts/ci_bootstrap.py
            tools/_bootstrap.py
            tools/common/__init__.py
            tools/common/file_traversal.py
            tools/common/gh_actions.py
            tools/common/git.py
            tools/common/proc.py
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Emit all-true outputs (non-PR)
        if: github.event_name != 'pull_request'
        id: nonpr
        shell: bash
        run: python3 "${GITHUB_WORKSPACE}/.github/scripts/detect_changes.py" --non-pr-passthrough

      - name: Harden Runner
        if: github.event_name == 'pull_request'
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repo
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Detect changes
        if: github.event_name == 'pull_request'
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          platform: ${{ inputs.platform }}

      - name: Compute outputs (PR)
        if: github.event_name == 'pull_request'
        id: pr
        shell: bash
        env:
          DETECT_ANY: ${{ steps.detect.outputs.any }}
          DETECT_LINUX: ${{ steps.detect.outputs.linux }}
          DETECT_WINDOWS: ${{ steps.detect.outputs.windows }}
          DETECT_MACOS: ${{ steps.detect.outputs.macos }}
          DETECT_ANDROID: ${{ steps.detect.outputs.android }}
          DETECT_DOCKER_LINUX: ${{ steps.detect.outputs.docker_linux }}
          DETECT_DOCKER_ANDROID: ${{ steps.detect.outputs.docker_android }}
        run: |
          {
            echo "should_build=${DETECT_ANY}"
            echo "linux=${DETECT_LINUX}"
            echo "windows=${DETECT_WINDOWS}"
            echo "macos=${DETECT_MACOS}"
            echo "android=${DETECT_ANDROID}"
            echo "docker_linux=${DETECT_DOCKER_LINUX}"
            echo "docker_android=${DETECT_DOCKER_ANDROID}"
          } >> "$GITHUB_OUTPUT"
