name: Detect Changes

on:
  workflow_call:
    inputs:
      platform:
        description: 'Space-separated platform(s) to detect changes for'
        required: true
        type: string
    outputs:
      should_build:
        description: 'Whether relevant files changed (first platform, backwards compat)'
        value: ${{ jobs.detect.outputs.should_build }}
      linux:
        description: 'Whether Linux-relevant files changed'
        value: ${{ jobs.detect.outputs.linux }}
      windows:
        description: 'Whether Windows-relevant files changed'
        value: ${{ jobs.detect.outputs.windows }}
      macos:
        description: 'Whether macOS-relevant files changed'
        value: ${{ jobs.detect.outputs.macos }}
      android:
        description: 'Whether Android-relevant files changed'
        value: ${{ jobs.detect.outputs.android }}

concurrency:
  # Scope per caller+platform: multiple platform workflows call this in parallel
  # for the same ref; a shared group would let GitHub cancel all but one.
  group: detect-changes-${{ inputs.platform }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  detect:
    name: Detect Changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_build: ${{ steps.detect.outputs.any }}
      linux: ${{ steps.detect.outputs.linux }}
      windows: ${{ steps.detect.outputs.windows }}
      macos: ${{ steps.detect.outputs.macos }}
      android: ${{ steps.detect.outputs.android }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Detect changes
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          platform: ${{ inputs.platform }}
