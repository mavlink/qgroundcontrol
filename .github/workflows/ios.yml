name: iOS

on:
  push:
    branches:
      - master
      - 'Stable*'
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
  pull_request:
    paths:
      - '.github/workflows/ios.yml'
      - '.github/actions/**'
      - 'deploy/ios/**'
      - 'src/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
  merge_group:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  id-token: write
  attestations: write
  actions: read

jobs:
  build:
    name: iOS
    runs-on: macos-15
    timeout-minutes: 120

    strategy:
      matrix:
        build_type: [Release]

    defaults:
      run:
        shell: bash

    env:
      PACKAGE: QGroundControl

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Get build config
        id: config
        uses: ./.github/actions/build-config

      - name: Initial Setup
        uses: ./.github/actions/common

      - name: Install Qt for iOS
        uses: ./.github/actions/qt-ios
        with:
          version: ${{ steps.config.outputs.qt_version }}
          modules: ${{ steps.config.outputs.qt_modules }}
          ios-modules: ${{ steps.config.outputs.qt_modules_ios }}
          xcode-version: ${{ steps.config.outputs.xcode_ios_version }}
          build-type: ${{ matrix.build_type }}
          cpm-modules: ${{ runner.temp }}/build/cpm_modules
          save-cache: ${{ github.event_name != 'pull_request' }}

      - name: Configure
        working-directory: ${{ runner.temp }}/build
        run: |
          # Pass CMAKE_OSX_ARCHITECTURES on command line - this is required for CMake 4.x
          # which runs platform detection before processing -C cache files.
          # Command-line -D options take precedence and are applied earlier.
          ${{ env.QT_ROOT_DIR }}/bin/qt-cmake -S ${{ github.workspace }} -B . -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DQT_HOST_PATH="${{ env.QT_ROOT_DIR }}/../macos" \
            -DQGC_STABLE_BUILD=${{ github.ref_type == 'tag' || contains(github.ref, 'Stable') && 'ON' || 'OFF' }}

      - name: Build
        working-directory: ${{ runner.temp }}/build
        run: cmake --build . --target all --config ${{ matrix.build_type }} --parallel

      - name: Attest Build Provenance
        if: matrix.build_type == 'Release' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: '${{ runner.temp }}/build/${{ env.PACKAGE }}.app'

      - name: Upload Build File
        uses: ./.github/actions/upload
        with:
          artifact_name: ${{ env.PACKAGE }}.app
          package_name: ${{ env.PACKAGE }}
          upload_aws: 'false'
