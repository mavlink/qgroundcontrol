name: Build GStreamer

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'linux'
        type: choice
        options:
          - linux
          - macos
          - windows
          - android
          - ios
      version:
        description: 'GStreamer version (tag, empty for default)'
        required: false
        default: ''
        type: string
      arch:
        description: 'Architecture (platform-specific options)'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - arm64
          - aarch64
          - universal
          - armv7
          - x86
          - x64
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug
      simulator:
        description: 'iOS Simulator build'
        required: false
        default: false
        type: boolean
      upload_s3:
        description: 'Upload to S3'
        required: false
        default: true
        type: boolean

concurrency:
  group: gstreamer-${{ inputs.platform }}-${{ inputs.arch }}-${{ inputs.simulator }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux ${{ inputs.arch }}
    if: inputs.platform == 'linux'
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 180

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/build-config.json
            tools/setup/gstreamer/build-gstreamer-linux.sh
            tools/setup/read-config.sh

      - name: Read build config
        id: config
        run: |
          version='${{ inputs.version }}'
          if [[ -z "$version" ]]; then
              version=$(jq -r '.gstreamer_version' .github/build-config.json)
          fi
          qt_version=$(jq -r '.qt_version' .github/build-config.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "qt_version=$qt_version" >> "$GITHUB_OUTPUT"

      - name: Install Qt (for qml6 plugin)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: linux
          target: desktop
          arch: ${{ inputs.arch == 'aarch64' && 'linux_gcc_arm64' || 'linux_gcc_64' }}
          cache: true
          cache-key-prefix: qt-gstreamer-linux

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config git \
            libx11-dev libxext-dev libxv-dev \
            libwayland-dev wayland-protocols \
            libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
            libdrm-dev libgbm-dev \
            libasound2-dev libpulse-dev \
            libva-dev \
            nasm yasm

      - name: Build GStreamer
        run: |
          chmod +x tools/setup/gstreamer/build-gstreamer-linux.sh
          ./tools/setup/gstreamer/build-gstreamer-linux.sh \
            --version '${{ steps.config.outputs.version }}' \
            --type '${{ inputs.build_type }}' \
            --prefix '${{ runner.temp }}/gstreamer' \
            --clean

      - name: Verify and test
        run: |
          prefix='${{ runner.temp }}/gstreamer'
          arch=$(uname -m)
          export LD_LIBRARY_PATH="$prefix/lib/$arch-linux-gnu"
          export GST_PLUGIN_PATH="$prefix/lib/$arch-linux-gnu/gstreamer-1.0"
          "$prefix/bin/gst-launch-1.0" --version

      - name: Create archive
        id: archive
        run: |
          version='${{ steps.config.outputs.version }}'
          arch='${{ inputs.arch }}'
          name="gstreamer-1.0-linux-$arch-$version"

          cd '${{ runner.temp }}'
          tar -cJf "$name.tar.xz" gstreamer

          echo "archive_name=$name" >> "$GITHUB_OUTPUT"
          echo "archive_path=${{ runner.temp }}/$name.tar.xz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: ${{ steps.archive.outputs.archive_path }}
          retention-days: 30

      - name: Upload to S3
        if: inputs.upload_s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          version='${{ steps.config.outputs.version }}'
          s3_path="s3://qgroundcontrol/dependencies/gstreamer/linux/$version"
          aws s3 cp '${{ steps.archive.outputs.archive_path }}' "$s3_path/${{ steps.archive.outputs.archive_name }}.tar.xz" --acl public-read

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## GStreamer Linux Build Complete

          | Property | Value |
          |----------|-------|
          | Version | ${{ steps.config.outputs.version }} |
          | Architecture | ${{ inputs.arch }} |
          | S3 Path | dependencies/gstreamer/linux/${{ steps.config.outputs.version }}/ |
          EOF

  macos:
    name: macOS ${{ inputs.arch }}
    if: inputs.platform == 'macos'
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/build-config.json
            tools/setup/gstreamer/build-gstreamer-macos.sh
            tools/setup/read-config.sh

      - name: Read build config
        id: config
        run: |
          version='${{ inputs.version }}'
          if [[ -z "$version" ]]; then
              version=$(jq -r '.gstreamer_version' .github/build-config.json)
          fi
          qt_version=$(jq -r '.qt_version' .github/build-config.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "qt_version=$qt_version" >> "$GITHUB_OUTPUT"

      - name: Install Qt (for qml6 plugin)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: mac
          target: desktop
          arch: clang_64
          cache: true
          cache-key-prefix: qt-gstreamer-macos

      - name: Install dependencies
        run: brew install pkg-config gettext

      - name: Build GStreamer
        run: |
          chmod +x tools/setup/gstreamer/build-gstreamer-macos.sh
          ./tools/setup/gstreamer/build-gstreamer-macos.sh \
            --version '${{ steps.config.outputs.version }}' \
            --arch '${{ inputs.arch }}' \
            --type '${{ inputs.build_type }}' \
            --prefix '${{ runner.temp }}/gstreamer' \
            --qt-prefix "$QT_ROOT_DIR" \
            --clean

      - name: Verify and test
        run: |
          prefix='${{ runner.temp }}/gstreamer'
          export DYLD_LIBRARY_PATH="$prefix/lib"
          export GST_PLUGIN_PATH="$prefix/lib/gstreamer-1.0"
          "$prefix/bin/gst-launch-1.0" --version

      - name: Create archive
        id: archive
        run: |
          version='${{ steps.config.outputs.version }}'
          arch='${{ inputs.arch }}'
          name="gstreamer-1.0-macos-$arch-$version"

          cd '${{ runner.temp }}'
          tar -cJf "$name.tar.xz" gstreamer

          echo "archive_name=$name" >> "$GITHUB_OUTPUT"
          echo "archive_path=${{ runner.temp }}/$name.tar.xz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: ${{ steps.archive.outputs.archive_path }}
          retention-days: 30

      - name: Upload to S3
        if: inputs.upload_s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          version='${{ steps.config.outputs.version }}'
          s3_path="s3://qgroundcontrol/dependencies/gstreamer/macos/$version"
          aws s3 cp '${{ steps.archive.outputs.archive_path }}' "$s3_path/${{ steps.archive.outputs.archive_name }}.tar.xz" --acl public-read

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## GStreamer macOS Build Complete

          | Property | Value |
          |----------|-------|
          | Version | ${{ steps.config.outputs.version }} |
          | Architecture | ${{ inputs.arch }} |
          | S3 Path | dependencies/gstreamer/macos/${{ steps.config.outputs.version }}/ |
          EOF

  windows:
    name: Windows ${{ inputs.arch }}
    if: inputs.platform == 'windows'
    runs-on: ${{ inputs.arch == 'arm64' && 'windows-11-arm' || 'windows-2022' }}
    timeout-minutes: 180

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/build-config.json
            tools/setup/gstreamer/build-gstreamer-windows.ps1
            tools/setup/read-config.ps1

      - name: Read build config
        id: config
        shell: pwsh
        run: |
          $config = Get-Content .github/build-config.json | ConvertFrom-Json
          $version = '${{ inputs.version }}'
          if (-not $version) {
              $version = $config.gstreamer_version
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "qt_version=$($config.qt_version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install Qt (for qml6 plugin)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: windows
          target: desktop
          arch: ${{ inputs.arch == 'arm64' && 'win64_msvc2022_arm64' || 'win64_msvc2022_64' }}
          cache: true
          cache-key-prefix: qt-gstreamer

      - name: Build GStreamer
        shell: pwsh
        run: |
          $arch = '${{ inputs.arch }}'
          # Normalize arch for Windows (x86_64 -> x64)
          if ($arch -eq 'x86_64') { $arch = 'x64' }

          $args = @{
              Version = '${{ steps.config.outputs.version }}'
              BuildType = '${{ inputs.build_type }}'
              Arch = $arch
              Prefix = "C:\gstreamer-$arch"
              WorkDir = '${{ runner.temp }}'
              QtPrefix = $env:QT_ROOT_DIR
              Clean = $true
          }

          $params = @()
          foreach ($key in $args.Keys) {
              $value = $args[$key]
              if ($value -is [bool]) {
                  if ($value) { $params += "-$key" }
              } else {
                  $params += "-$key"
                  $params += $value
              }
          }

          Write-Host "Running: .\tools\setup\gstreamer\build-gstreamer-windows.ps1 $($params -join ' ')"
          & .\tools\setup\gstreamer\build-gstreamer-windows.ps1 @args

      - name: Verify build
        shell: pwsh
        run: |
          $arch = '${{ inputs.arch }}'
          if ($arch -eq 'x86_64') { $arch = 'x64' }
          $prefix = "C:\gstreamer-$arch"
          $binDir = Join-Path $prefix 'bin'
          $libDir = Join-Path $prefix 'lib'

          Write-Host "=== Checking installation ==="
          Write-Host "Bin directory:"
          Get-ChildItem $binDir -Filter '*.exe' | Select-Object Name, Length | Format-Table

          Write-Host "`nLibraries:"
          (Get-ChildItem $libDir -Filter '*.lib' | Measure-Object).Count
          Write-Host "library files found"

      - name: Create archive
        id: archive
        shell: pwsh
        run: |
          $arch = '${{ inputs.arch }}'
          if ($arch -eq 'x86_64') { $arch = 'x64' }
          $prefix = "C:\gstreamer-$arch"
          $version = '${{ steps.config.outputs.version }}'
          $archiveName = "gstreamer-1.0-msvc-$arch-$version"

          Write-Host "Creating archive: $archiveName.zip"
          Compress-Archive -Path $prefix -DestinationPath "${{ runner.temp }}\$archiveName.zip" -CompressionLevel Optimal

          "archive_name=$archiveName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "archive_path=${{ runner.temp }}\$archiveName.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: ${{ steps.archive.outputs.archive_path }}
          retention-days: 30

      - name: Upload to S3
        if: inputs.upload_s3
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          $version = '${{ steps.config.outputs.version }}'
          $s3Path = "s3://qgroundcontrol/dependencies/gstreamer/windows/$version"

          if (-not (Get-Command aws -ErrorAction SilentlyContinue)) {
              Write-Host "Installing AWS CLI..."
              Invoke-WebRequest -Uri "https://awscli.amazonaws.com/AWSCLIV2.msi" -OutFile "${{ runner.temp }}\AWSCLIV2.msi"
              Start-Process msiexec.exe -ArgumentList "/i `"${{ runner.temp }}\AWSCLIV2.msi`" /quiet" -Wait
              $env:PATH = "C:\Program Files\Amazon\AWSCLIV2;$env:PATH"
          }

          aws s3 cp "${{ steps.archive.outputs.archive_path }}" "$s3Path/${{ steps.archive.outputs.archive_name }}.zip" --acl public-read

      - name: Summary
        shell: pwsh
        run: |
          $arch = '${{ inputs.arch }}'
          if ($arch -eq 'x86_64') { $arch = 'x64' }
          $summary = @"
          ## GStreamer Windows Build Complete

          | Property | Value |
          |----------|-------|
          | Version | ${{ steps.config.outputs.version }} |
          | Architecture | $arch |
          | S3 Path | dependencies/gstreamer/windows/${{ steps.config.outputs.version }}/ |
          "@
          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  android:
    name: Android ${{ inputs.arch }}
    if: inputs.platform == 'android'
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/build-config.json
            tools/setup/gstreamer/build-gstreamer-android.sh
            tools/setup/read-config.sh

      - name: Read build config
        id: config
        run: |
          version='${{ inputs.version }}'
          if [[ -z "$version" ]]; then
              version=$(jq -r '.gstreamer_version' .github/build-config.json)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip git autoconf automake libtool \
            pkg-config gettext bison flex cmake ninja-build

      - name: Build GStreamer
        run: |
          chmod +x tools/setup/gstreamer/build-gstreamer-android.sh
          ./tools/setup/gstreamer/build-gstreamer-android.sh \
            --version '${{ steps.config.outputs.version }}' \
            --arch '${{ inputs.arch }}' \
            --type '${{ inputs.build_type }}' \
            --output '${{ runner.temp }}/output' \
            --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gstreamer-1.0-android-${{ inputs.arch }}-${{ steps.config.outputs.version }}
          path: ${{ runner.temp }}/output/*.tar.*
          retention-days: 30

      - name: Upload to S3
        if: inputs.upload_s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          version='${{ steps.config.outputs.version }}'
          s3_path="s3://qgroundcontrol/dependencies/gstreamer/android/$version"

          for archive in '${{ runner.temp }}/output'/*.tar.*; do
            [[ -f "$archive" ]] && aws s3 cp "$archive" "$s3_path/$(basename "$archive")" --acl public-read
          done

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## GStreamer Android Build Complete

          | Property | Value |
          |----------|-------|
          | Version | ${{ steps.config.outputs.version }} |
          | Architecture | ${{ inputs.arch }} |
          | S3 Path | dependencies/gstreamer/android/${{ steps.config.outputs.version }}/ |
          EOF

  ios:
    name: iOS ${{ inputs.arch }}${{ inputs.simulator && ' (Simulator)' || '' }}
    if: inputs.platform == 'ios'
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/build-config.json
            tools/setup/gstreamer/build-gstreamer-ios.sh
            tools/setup/read-config.sh

      - name: Read build config
        id: config
        run: |
          version='${{ inputs.version }}'
          if [[ -z "$version" ]]; then
              version=$(jq -r '.gstreamer_version' .github/build-config.json)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

          arch='${{ inputs.arch }}'
          suffix="$arch"
          if [[ '${{ inputs.simulator }}' == 'true' ]]; then
              suffix="$arch-simulator"
          fi
          echo "suffix=$suffix" >> "$GITHUB_OUTPUT"

      - name: Build GStreamer
        run: |
          chmod +x tools/setup/gstreamer/build-gstreamer-ios.sh

          args=(
            --version '${{ steps.config.outputs.version }}'
            --arch '${{ inputs.arch }}'
            --type '${{ inputs.build_type }}'
            --output '${{ runner.temp }}/output'
            --clean
          )

          if [[ '${{ inputs.simulator }}' == 'true' ]]; then
              args+=(--simulator)
          fi

          ./tools/setup/gstreamer/build-gstreamer-ios.sh "${args[@]}"

      - name: Create archive
        id: archive
        run: |
          version='${{ steps.config.outputs.version }}'
          suffix='${{ steps.config.outputs.suffix }}'
          name="gstreamer-1.0-ios-$suffix-$version"

          cd '${{ runner.temp }}/output'

          archive=$(find . -maxdepth 1 -type f \( -name "*.tar.xz" -o -name "*.tar.gz" -o -name "*.tar.bz2" \) | head -1)

          if [[ -z "$archive" ]]; then
            echo "::error::No archive found in output directory"
            ls -la
            exit 1
          fi

          mv "$archive" "$name.tar.xz"

          echo "archive_name=$name" >> "$GITHUB_OUTPUT"
          echo "archive_path=${{ runner.temp }}/output/$name.tar.xz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: ${{ steps.archive.outputs.archive_path }}
          retention-days: 30

      - name: Upload to S3
        if: inputs.upload_s3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          version='${{ steps.config.outputs.version }}'
          s3_path="s3://qgroundcontrol/dependencies/gstreamer/ios/$version"
          aws s3 cp '${{ steps.archive.outputs.archive_path }}' "$s3_path/${{ steps.archive.outputs.archive_name }}.tar.xz" --acl public-read

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## GStreamer iOS Build Complete

          | Property | Value |
          |----------|-------|
          | Version | ${{ steps.config.outputs.version }} |
          | Architecture | ${{ steps.config.outputs.suffix }} |
          | Simulator | ${{ inputs.simulator }} |
          | S3 Path | dependencies/gstreamer/ios/${{ steps.config.outputs.version }}/ |
          EOF
