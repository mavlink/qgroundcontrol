name: Clazy Analysis

on:
  workflow_dispatch:
    inputs:
      path:
        description: 'Path to analyze (e.g., src/Vehicle/ or src/Vehicle/Vehicle.cc)'
        required: false
        default: ''
        type: string
      analyze_all:
        description: 'Analyze all source files (ignores path input)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clazy:
    name: Qt Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Get build config
        id: config
        uses: ./.github/actions/build-config

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clazy ninja-build

      - name: Install Qt
        uses: ./.github/actions/qt-install
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: linux
          arch: linux_gcc_64
          modules: ${{ steps.config.outputs.qt_modules }}

      - name: Configure (generate compile_commands.json)
        working-directory: ${{ runner.temp }}/build
        run: |
          ${{ env.QT_ROOT_DIR }}/bin/qt-cmake -S ${{ github.workspace }} -B . -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run Clazy
        working-directory: ${{ github.workspace }}
        env:
          INPUT_PATH: ${{ inputs.path }}
          ANALYZE_ALL: ${{ inputs.analyze_all }}
        run: |
          ARGS="--tool clazy --build-dir ${{ runner.temp }}/build"

          if [[ "$ANALYZE_ALL" == "true" ]]; then
            ARGS="$ARGS --all"
          elif [[ -n "$INPUT_PATH" ]]; then
            # Validate path doesn't escape repo
            if [[ "$INPUT_PATH" =~ \.\. ]] || [[ "$INPUT_PATH" = /* ]]; then
              echo "::error::Invalid path: must be relative, no '..'"
              exit 1
            fi
            ARGS="$ARGS $INPUT_PATH"
          else
            ARGS="$ARGS --all"
          fi

          echo "Running: ./tools/analyze.sh $ARGS"
          ./tools/analyze.sh $ARGS
