name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Per-job permissions narrow each scope; the top-level only grants read.
permissions:
  contents: read

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write       # @semantic-release/git pushes CHANGELOG.md
      issues: write         # @semantic-release/github comments on closed issues
      pull-requests: write  # @semantic-release/github comments on closed PRs
    outputs:
      new_release: ${{ steps.release.outputs.new_release }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./tools/release.py --install
          # @semantic-release/exec verifyReleaseCmd writes .release-version
          # iff a release was actually published. Reading from a file is
          # immune to log-format drift across SR major versions.
          rm -f .release-version
          ./tools/release.py --run

          if [[ -f .release-version ]]; then
            version=$(tr -d '[:space:]' < .release-version)
            if [[ -z "${version}" ]]; then
              echo "::error::semantic-release wrote an empty version file"
              exit 1
            fi
            echo "new_release=true" >> "${GITHUB_OUTPUT}"
            echo "version=${version}" >> "${GITHUB_OUTPUT}"
            echo "New release: v${version}"
          else
            echo "new_release=false" >> "${GITHUB_OUTPUT}"
            echo "No new release"
          fi

  wait-for-builds:
    name: Wait for Platform Builds
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      actions: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Dispatch platform builds
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.semantic-release.outputs.version }}
        run: |
          set -euo pipefail
          for workflow in linux.yml windows.yml macos.yml android.yml ios.yml; do
            gh workflow run "$workflow" --ref "$RELEASE_TAG"
          done

      - name: Wait for builds to complete
        uses: int128/wait-for-workflows-action@v1
        with:
          filter-workflow-names: |
            Linux
            Windows
            MacOS
            Android
            iOS
          filter-workflow-events: workflow_dispatch
          sha: ${{ github.sha }}
          period-seconds: 300

  upload-artifacts:
    name: Upload Release Artifacts
    needs: [semantic-release, wait-for-builds]
    if: needs.semantic-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: ./.github/actions/download-all-artifacts
        with:
          head-sha: ${{ github.sha }}
          event: workflow_dispatch
          output-dir: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50 || echo "No artifacts found"

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          python3 "${GITHUB_WORKSPACE}/.github/scripts/find_artifact.py" \
            --build-dir artifacts \
            --match "appimage=QGroundControl*.AppImage" \
            --match "apk=QGroundControl-linux/*.apk"

      # Source-tree SBOM is kept as a release artifact for source traceability,
      # but it is NOT used as the attestation evidence (per-platform SBOMs are).
      - name: Generate source SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-source.spdx.json
          artifact-name: sbom-source-spdx

      - name: Generate source SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-source.cdx.json
          artifact-name: sbom-source-cyclonedx

      - name: Extract AppImage contents
        if: steps.paths.outputs.appimage != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted/linux
          cp "${STEPS_PATHS_OUTPUTS_APPIMAGE}" extracted/linux/qgc.AppImage
          chmod +x extracted/linux/qgc.AppImage
          (cd extracted/linux && ./qgc.AppImage --appimage-extract >/dev/null)
          rm extracted/linux/qgc.AppImage
        env:
          STEPS_PATHS_OUTPUTS_APPIMAGE: ${{ steps.paths.outputs.appimage }}

      - name: Attest Linux AppImage
        id: attest-linux
        if: steps.paths.outputs.appimage != ''
        uses: ./.github/actions/attest-sbom
        with:
          subject-path: ${{ steps.paths.outputs.appimage }}
          subject-name: linux-appimage
          scan-path: extracted/linux/squashfs-root
        continue-on-error: true

      - name: Extract APK contents
        if: steps.paths.outputs.apk != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted/android
          unzip -q -o "${STEPS_PATHS_OUTPUTS_APK}" -d extracted/android
        env:
          STEPS_PATHS_OUTPUTS_APK: ${{ steps.paths.outputs.apk }}

      - name: Attest Android APK
        id: attest-android
        if: steps.paths.outputs.apk != ''
        uses: ./.github/actions/attest-sbom
        with:
          subject-path: ${{ steps.paths.outputs.apk }}
          subject-name: android-apk
          scan-path: extracted/android
        continue-on-error: true

      - name: Upload to Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.semantic-release.outputs.version }}
          LINUX_SBOM: ${{ steps.attest-linux.outputs.sbom-path }}
          ANDROID_SBOM: ${{ steps.attest-android.outputs.sbom-path }}
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
            checksum="${file}.sha256"
            if [[ ! -f "$checksum" ]]; then
              echo "::error::Required checksum not found: $checksum"
              exit 1
            fi
            files+=("$checksum")
          done < <(find artifacts -type f \( \
            -name '*.AppImage' -o -name '*.dmg' -o -name '*.exe' -o -name '*.apk' \
          \) -print0)

          for file in \
            sbom-source.spdx.json \
            sbom-source.cdx.json \
            "$LINUX_SBOM" \
            "$ANDROID_SBOM"; do
            if [[ -n "$file" && -f "$file" ]]; then
              files+=("$file")
            fi
          done

          for name in \
            QGroundControl-macos.sbom.spdx.json \
            QGroundControl-installer-AMD64-windows.sbom.spdx.json \
            QGroundControl-installer-ARM64-windows.sbom.spdx.json \
            QGroundControl-installer-AMD64-ARM64-windows.sbom.spdx.json; do
            native_sbom=$(find artifacts -type f -name "$name" -print -quit)
            if [[ -z "$native_sbom" ]]; then
              echo "::error::Required native SBOM not found: $name"
              exit 1
            fi
            files+=("$native_sbom")
          done

          if (( ${#files[@]} == 0 )); then
            echo "::error::No release artifacts were found"
            exit 1
          fi

          printf 'Uploading %d release artifacts to %s:\n' "${#files[@]}" "$RELEASE_TAG"
          printf '  %s\n' "${files[@]}"
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
