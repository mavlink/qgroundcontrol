name: Release

# TODO: Disabled — semantic-release blocked by branch protection (can't push CHANGELOG.md)
# Fix options:
#   1. Remove @semantic-release/git plugin (skip CHANGELOG commit)
#   2. Use a PAT from an allowed pusher
#   3. Use a GitHub App token with bypass permissions
# Until fixed, this workflow only runs via manual workflow_dispatch.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      new_release: ${{ steps.release.outputs.new_release }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./tools/release.sh --install
          # @semantic-release/exec verifyReleaseCmd writes .release-version
          # iff a release was actually published. Reading from a file is
          # immune to log-format drift across SR major versions.
          rm -f .release-version
          ./tools/release.sh --run

          if [[ -f .release-version ]]; then
            version=$(tr -d '[:space:]' < .release-version)
            if [[ -z "${version}" ]]; then
              echo "::error::semantic-release wrote an empty version file"
              exit 1
            fi
            echo "new_release=true" >> "${GITHUB_OUTPUT}"
            echo "version=${version}" >> "${GITHUB_OUTPUT}"
            echo "New release: v${version}"
          else
            echo "new_release=false" >> "${GITHUB_OUTPUT}"
            echo "No new release"
          fi

  wait-for-builds:
    name: Wait for Platform Builds
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Wait for builds to complete
        uses: int128/wait-for-workflows-action@v1
        with:
          workflow-names: |
            Linux
            Windows
            MacOS
            Android
          timeout-minutes: 170
          poll-interval-minutes: 5

  upload-artifacts:
    name: Upload Release Artifacts
    needs: [semantic-release, wait-for-builds]
    if: needs.semantic-release.outputs.new_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50 || echo "No artifacts found"

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          first() { find artifacts -type f -name "$1" 2>/dev/null | head -n1; }
          {
            echo "appimage=$(first 'QGroundControl*.AppImage')"
            echo "apk=$(first '*.apk')"
            echo "dmg=$(first '*.dmg')"
            echo "exe=$(first 'QGroundControl*.exe')"
          } >> "${GITHUB_OUTPUT}"

      # Source-tree SBOM is kept as a release artifact for source traceability,
      # but it is NOT used as the attestation evidence (per-platform SBOMs are).
      - name: Generate source SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-source.spdx.json
          artifact-name: sbom-source-spdx

      - name: Generate source SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-source.cdx.json
          artifact-name: sbom-source-cyclonedx

      - name: Extract AppImage contents
        if: steps.paths.outputs.appimage != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted/linux
          cp "${{ steps.paths.outputs.appimage }}" extracted/linux/qgc.AppImage
          chmod +x extracted/linux/qgc.AppImage
          (cd extracted/linux && ./qgc.AppImage --appimage-extract >/dev/null)
          rm extracted/linux/qgc.AppImage

      - name: SBOM for Linux AppImage
        if: steps.paths.outputs.appimage != ''
        uses: anchore/sbom-action@v0
        with:
          path: extracted/linux/squashfs-root
          format: spdx-json
          output-file: sbom-linux.spdx.json
          artifact-name: sbom-linux

      - name: Attest Linux AppImage
        if: steps.paths.outputs.appimage != ''
        uses: actions/attest-sbom@v4
        with:
          subject-path: ${{ steps.paths.outputs.appimage }}
          sbom-path: sbom-linux.spdx.json
        continue-on-error: true

      - name: Extract APK contents
        if: steps.paths.outputs.apk != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p extracted/android
          unzip -q -o "${{ steps.paths.outputs.apk }}" -d extracted/android

      - name: SBOM for Android APK
        if: steps.paths.outputs.apk != ''
        uses: anchore/sbom-action@v0
        with:
          path: extracted/android
          format: spdx-json
          output-file: sbom-android.spdx.json
          artifact-name: sbom-android

      - name: Attest Android APK
        if: steps.paths.outputs.apk != ''
        uses: actions/attest-sbom@v4
        with:
          subject-path: ${{ steps.paths.outputs.apk }}
          sbom-path: sbom-android.spdx.json
        continue-on-error: true

      # DMG/EXE: Linux runner can't deeply extract these; Syft scans the file
      # best-effort. For full coverage, mac/Windows builds should emit their
      # own SBOM as an artifact (followup).
      - name: SBOM for macOS DMG
        if: steps.paths.outputs.dmg != ''
        uses: anchore/sbom-action@v0
        with:
          path: ${{ steps.paths.outputs.dmg }}
          format: spdx-json
          output-file: sbom-macos.spdx.json
          artifact-name: sbom-macos

      - name: Attest macOS DMG
        if: steps.paths.outputs.dmg != ''
        uses: actions/attest-sbom@v4
        with:
          subject-path: ${{ steps.paths.outputs.dmg }}
          sbom-path: sbom-macos.spdx.json
        continue-on-error: true

      - name: SBOM for Windows EXE
        if: steps.paths.outputs.exe != ''
        uses: anchore/sbom-action@v0
        with:
          path: ${{ steps.paths.outputs.exe }}
          format: spdx-json
          output-file: sbom-windows.spdx.json
          artifact-name: sbom-windows

      - name: Attest Windows EXE
        if: steps.paths.outputs.exe != ''
        uses: actions/attest-sbom@v4
        with:
          subject-path: ${{ steps.paths.outputs.exe }}
          sbom-path: sbom-windows.spdx.json
        continue-on-error: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.semantic-release.outputs.version }}
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.apk
            sbom-source.spdx.json
            sbom-source.cdx.json
            sbom-linux.spdx.json
            sbom-android.spdx.json
            sbom-macos.spdx.json
            sbom-windows.spdx.json
          fail_on_unmatched_files: false
