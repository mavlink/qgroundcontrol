name: Flatpak

on:
  workflow_dispatch:

concurrency:
  # flatpak-builder with the same cache key concurrently is undefined behavior.
  group: flatpak-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flatpak:
    name: Flatpak
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47@sha256:1bcc94399a82b7102820ac91037971fa61577c1cda1ffac0145ad12ce606e8c4
      # flatpak-builder requires namespace operations not available in an unprivileged container.
      # This workflow is manual-trigger only and runner egress is audited as mitigation.
      options: --privileged

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build Flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: QGroundControl.flatpak
          manifest-path: deploy/linux/org.mavlink.qgroundcontrol.flatpak.yml
          cache: false

      - name: Upload Flatpak
        uses: actions/upload-artifact@v7
        with:
          name: QGroundControl-flatpak
          path: QGroundControl.flatpak
          retention-days: 14
          compression-level: 0
