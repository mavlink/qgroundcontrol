name: Cache Cleanup (PR)

on:
  pull_request_target:  # zizmor: ignore[dangerous-triggers] deletes the PR merge-ref cache via trusted base script; no PR code checkout/execution
    types: [closed]

permissions:
  actions: write

jobs:
  cleanup:
    uses: ./.github/workflows/_cache-cleanup.yml
    with:
      branch: refs/pull/${{ github.event.pull_request.number }}/merge
      dry-run: false
      timeout-minutes: 5
