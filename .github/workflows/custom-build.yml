name: Custom Build

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  changes:
    uses: ./.github/workflows/_detect-changes.yml
    with:
      platform: custom-build

  build:
    name: Custom Plugin Build
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ${{ github.repository_owner == 'mavlink' && format('runs-on={0}/runner=linux-x64-builder-60gb', github.run_id) || 'ubuntu-24.04' }}
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      - name: Enable RunsOn magic cache
        if: github.repository_owner == 'mavlink'
        uses: runs-on/action@v2
        with:
          metrics: cpu,network,memory,disk,io
          show_costs: summary

      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Build Environment
        uses: ./.github/actions/build-setup
        with:
          qt-host: linux
          qt-arch: linux_gcc_64
          build-type: Release
          save-cache: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Configure
        uses: ./.github/actions/cmake-configure
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: Release
          extra-args: -DQGC_CUSTOM_DIR=custom-example

      - name: Build
        uses: ./.github/actions/cmake-build
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: Release

      - name: Create AppImage
        uses: ./.github/actions/cmake-install
        with:
          build-dir: ${{ runner.temp }}/build
          build-type: Release

      - name: Verify Custom AppImage
        uses: ./.github/actions/verify-executable
        with:
          binary-path: Custom-QGroundControl-x86_64.AppImage
          type: appimage
          working-dir: ${{ runner.temp }}/build
