name: Performance Metrics

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
  workflow_dispatch:
    inputs:
      run_benchmarks:
        description: 'Run time-based benchmarks (noisy on shared runners)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  size-metrics:
    name: Size Metrics
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      binary_size: ${{ steps.metrics.outputs.binary_size }}
      stripped_size: ${{ steps.metrics.outputs.stripped_size }}
      symbol_count: ${{ steps.metrics.outputs.symbol_count }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Get build config
        id: config
        uses: ./.github/actions/build-config

      - name: Install Qt
        uses: ./.github/actions/qt-install
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: linux
          arch: linux_gcc_64
          modules: ${{ steps.config.outputs.qt_modules }}

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Install bloaty (binary size analyzer)
        run: |
          # bloaty is not in Ubuntu repos - build from source
          # Skip if it takes too long (timeout after 2 min)
          timeout 120 bash -c '
            sudo apt-get install -y libprotobuf-dev protobuf-compiler libre2-dev libcapstone-dev || true
            git clone --depth 1 https://github.com/google/bloaty.git /tmp/bloaty
            cd /tmp/bloaty
            cmake -B build -DCMAKE_BUILD_TYPE=Release -DBLOATY_ENABLE_RE2=ON
            cmake --build build --parallel
            sudo cmake --install build
          ' || echo "::warning::bloaty installation timed out, size analysis will be limited"

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQGC_STABLE_BUILD=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Collect size metrics
        id: metrics
        run: |
          binary="build/QGroundControl"

          # Binary size
          binary_size=$(stat -c%s "$binary")
          echo "binary_size=$binary_size" >> "$GITHUB_OUTPUT"

          # Stripped size
          cp "$binary" "${binary}.stripped"
          strip "${binary}.stripped"
          stripped_size=$(stat -c%s "${binary}.stripped")
          echo "stripped_size=$stripped_size" >> "$GITHUB_OUTPUT"

          # Symbol count
          symbol_count=$(nm "$binary" 2>/dev/null | wc -l)
          echo "symbol_count=$symbol_count" >> "$GITHUB_OUTPUT"

          # Section sizes
          echo "=== Section sizes ===" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          size -A "$binary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Bloaty analysis
        run: |
          echo "=== Top 20 largest symbols ===" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bloaty -d symbols -n 20 build/QGroundControl >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "Bloaty analysis skipped"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "=== Size by compilation unit ===" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bloaty -d compileunits -n 20 build/QGroundControl >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "Bloaty analysis skipped"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Generate metrics JSON
        run: |
          cat > metrics.json << EOF
          [
            {
              "name": "Binary Size",
              "unit": "bytes",
              "value": ${{ steps.metrics.outputs.binary_size }}
            },
            {
              "name": "Stripped Size",
              "unit": "bytes",
              "value": ${{ steps.metrics.outputs.stripped_size }}
            },
            {
              "name": "Symbol Count",
              "unit": "symbols",
              "value": ${{ steps.metrics.outputs.symbol_count }}
            }
          ]
          EOF

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v6
        with:
          name: size-metrics
          path: metrics.json
          retention-days: 90

      - name: Store size metrics
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          tool: customSmallerIsBetter
          output-file-path: metrics.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          benchmark-data-dir-path: dev/size
          alert-threshold: '110%'
          comment-on-alert: true
          fail-on-alert: false

      - name: Compare with base (PR only)
        if: github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: metrics.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          benchmark-data-dir-path: dev/size
          alert-threshold: '105%'
          comment-on-alert: true
          fail-on-alert: false

      - name: Summary
        run: |
          binary_mb=$(echo "scale=2; ${{ steps.metrics.outputs.binary_size }} / 1048576" | bc)
          stripped_mb=$(echo "scale=2; ${{ steps.metrics.outputs.stripped_size }} / 1048576" | bc)

          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ## Size Metrics

          | Metric | Value |
          |--------|-------|
          | Binary Size | ${binary_mb} MB (${{ steps.metrics.outputs.binary_size }} bytes) |
          | Stripped Size | ${stripped_mb} MB (${{ steps.metrics.outputs.stripped_size }} bytes) |
          | Symbol Count | ${{ steps.metrics.outputs.symbol_count }} |
          EOF

  benchmarks:
    name: Runtime Benchmarks
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    if: github.event.inputs.run_benchmarks == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/master')
    needs: size-metrics

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Get build config
        id: config
        uses: ./.github/actions/build-config

      - name: Install Qt
        uses: ./.github/actions/qt-install
        with:
          version: ${{ steps.config.outputs.qt_version }}
          host: linux
          arch: linux_gcc_64
          modules: ${{ steps.config.outputs.qt_modules }}

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQGC_STABLE_BUILD=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run benchmarks
        id: bench
        run: |
          # Run Qt Test MAVLink benchmarks
          # Output format: RESULT : MAVLinkBenchmark::benchmarkHeartbeatPack():
          #     0.00015 msecs per iteration (total: 78, iterations: 524288)

          export QT_QPA_PLATFORM=offscreen
          ./build/QGroundControl --unittest:MAVLinkBenchmark 2>&1 | tee benchmark-output.txt || true

          # Parse Qt Test benchmark output to JSON
          python3 << 'PARSE_SCRIPT'
          import re
          import json

          results = []
          with open('benchmark-output.txt', 'r') as f:
              for line in f:
                  # Match: RESULT : TestClass::testFunc(): X.XXX msecs per iteration
                  match = re.search(
                      r'RESULT\s*:\s*\w+::(\w+)\(\):\s*([\d.]+)\s*(\w+)\s*per iteration',
                      line
                  )
                  if match:
                      name = match.group(1)
                      value = float(match.group(2))
                      unit = match.group(3)

                      # Normalize to microseconds for consistency
                      if unit == 'msecs':
                          value *= 1000
                          unit = 'usecs'
                      elif unit == 'secs':
                          value *= 1000000
                          unit = 'usecs'

                      results.append({
                          'name': name,
                          'unit': unit,
                          'value': value
                      })

          if not results:
              # Fallback: measure startup time
              import subprocess
              import time
              start = time.time()
              subprocess.run(['./build/QGroundControl', '--unittest', '--list-tests'],
                           capture_output=True, timeout=30, env={'QT_QPA_PLATFORM': 'offscreen'})
              elapsed_ms = (time.time() - start) * 1000
              results = [{'name': 'Startup (list tests)', 'unit': 'ms', 'value': elapsed_ms}]

          with open('benchmark.json', 'w') as f:
              json.dump(results, f, indent=2)

          print(f"Parsed {len(results)} benchmark results")
          PARSE_SCRIPT

          if [[ -s benchmark.json ]]; then
            echo "has_benchmarks=true" >> "$GITHUB_OUTPUT"
            cat benchmark.json
          else
            echo "has_benchmarks=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' }}
          benchmark-data-dir-path: dev/bench
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Runtime Benchmarks

          ⚠️ **Note**: Runtime benchmarks on shared runners have ~3x variance.
          Only significant regressions (>50%) trigger alerts.

          ### MAVLink Benchmarks
          EOF

          if [[ -f benchmark.json ]]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat benchmark.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No benchmark results available" >> "$GITHUB_STEP_SUMMARY"
          fi
