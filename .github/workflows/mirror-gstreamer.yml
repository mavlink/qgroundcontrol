name: Mirror GStreamer

# Mirror official upstream GStreamer release artifacts into the QGC S3 bucket
# (s3://qgroundcontrol/dependencies/gstreamer/<platform>/<filename>) — the
# fallback mirror the build reads when the upstream download is unavailable.
# Run this after bumping gstreamer.version in build-config.json.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'GStreamer version (empty = build-config default)'
        required: false
        default: ''
        type: string
      platforms:
        description: "Platforms to mirror ('all' or comma list: android,ios,macos,windows)"
        required: false
        default: 'all'
        type: string
      dry_run:
        description: 'Download and verify only; do not upload'
        required: false
        default: false
        type: boolean
      force:
        description: 'Re-upload even if the object already exists'
        required: false
        default: false
        type: boolean

concurrency:
  group: mirror-gstreamer-${{ inputs.version }}-${{ inputs.platforms }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  mirror:
    name: Mirror GStreamer ${{ inputs.version || 'default' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          sparse-checkout: |
            .github
            tools
          sparse-checkout-cone-mode: false

      - name: Build Config
        id: buildconfig
        uses: ./.github/actions/build-config

      - name: Configure AWS Credentials
        if: ${{ !inputs.dry_run }}
        uses: ./.github/actions/aws-credentials
        with:
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Mirror artifacts
        shell: bash
        env:
          VERSION: ${{ inputs.version || steps.buildconfig.outputs.gstreamer_version }}
          PLATFORMS: ${{ inputs.platforms }}
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          FORCE: ${{ inputs.force && 'true' || 'false' }}
          WORK_DIR: ${{ runner.temp }}
          AWS_DEFAULT_REGION: us-west-2
        run: |
          set -euo pipefail
          args=(
            --version "$VERSION"
            --platforms "$PLATFORMS"
            --work-dir "$WORK_DIR"
          )
          [[ "$DRY_RUN" == "true" ]] && args+=(--dry-run)
          [[ "$FORCE" == "true" ]] && args+=(--force)
          python3 "${GITHUB_WORKSPACE}/.github/scripts/mirror_gstreamer.py" "${args[@]}"
