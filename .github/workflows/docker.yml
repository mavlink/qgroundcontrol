name: Docker

on:
  push:
    branches:
      - master
      - 'Stable*'
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  changes:
    uses: ./.github/workflows/_detect-changes.yml
    with:
      platform: docker-linux docker-android

  plan-builds:
    name: Plan Docker Builds
    runs-on: ubuntu-latest
    needs: changes
    if: always() && !cancelled()
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_jobs: ${{ steps.plan.outputs.has_jobs }}
    steps:
      - name: Checkout planner
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/scripts/plan_docker_builds.py
            .github/scripts/ci_bootstrap.py
            tools/_bootstrap.py
            tools/common/gh_actions.py
          sparse-checkout-cone-mode: false

      - name: Plan matrix
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          LINUX: ${{ needs.changes.outputs.docker_linux }}
          ANDROID: ${{ needs.changes.outputs.docker_android }}
        run: python3 "${GITHUB_WORKSPACE}/.github/scripts/plan_docker_builds.py"

  build:
    name: Docker ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: [changes, plan-builds]
    if: always() && !cancelled() && needs.plan-builds.outputs.has_jobs == 'true'
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write
      packages: write  # buildkit cache → ghcr.io

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan-builds.outputs.matrix) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Free Disk Space
        uses: ./.github/actions/free-disk-space
        with:
          remove-android: ${{ matrix.platform != 'Android' }}
          remove-tool-cache: 'true'
          remove-swap: 'true'
          remove-folders: /usr/local/lib/docker/overlay2

      - name: Build with Docker
        uses: ./.github/actions/docker
        with:
          dockerfile: ${{ matrix.dockerfile }}
          fuse: ${{ matrix.fuse }}
          docker-username: ${{ secrets.DOCKERHUB_USERNAME }}
          docker-token: ${{ secrets.DOCKERHUB_TOKEN }}
          # GHCR for rolling master/Stable; Docker Hub for v* release tags. Upstream-only to keep forks off the registries.
          push-image: >-
            ${{
              (github.event_name == 'push' && github.repository == 'mavlink/qgroundcontrol' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/Stable')))
              && 'ghcr.io/mavlink/qgroundcontrol'
              || (
                (github.event_name == 'push' && github.repository == 'mavlink/qgroundcontrol' && startsWith(github.ref, 'refs/tags/v'))
                && 'dronecode/qgroundcontrol'
                || ''
              )
            }}

      - name: Find build artifact
        id: artifact
        run: >-
          python3 "${GITHUB_WORKSPACE}/.github/scripts/find_artifact.py"
          --build-dir "${{ github.workspace }}/build"
          --pattern "${{ matrix.artifact_pattern }}"

      - name: Generate CPM dependency SBOM
        if: steps.artifact.outputs.found == 'true'
        run: >-
          python3 "${GITHUB_WORKSPACE}/.github/scripts/generate_cpm_sbom.py"
          --build-dir "${{ github.workspace }}/build"
          -o cpm-sbom.cdx.json

      - name: Scan SBOM with Grype
        if: steps.artifact.outputs.found == 'true'
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          sbom: cpm-sbom.cdx.json
          fail-build: false
          severity-cutoff: high
          only-fixed: true
          output-format: sarif

      - name: Upload Grype results to GitHub Security
        if: steps.artifact.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: 'grype-${{ matrix.platform }}'
