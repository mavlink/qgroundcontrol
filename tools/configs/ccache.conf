# ccache configuration for QGroundControl
#
# Loaded at build time via the generated ccache-launcher wrapper script
# in the build directory, which sets:
#   - CCACHE_CONFIGPATH = <project>/tools/configs/ccache.conf
#   - CCACHE_DIR = <project>/.ccache
#   - CCACHE_BASEDIR = <project>
#
# For standalone use (run from project root):
#   export CCACHE_CONFIGPATH=$PWD/tools/configs/ccache.conf

# Cache directory - set by CMake via CCACHE_DIR environment variable
# cache_dir = .ccache

# Base directory - set by CMake via CCACHE_BASEDIR environment variable
# base_dir = .

# Local .ccache ceiling during a build, not the saved-entry size — Qt6 + QGC has
# ~1000+ TUs so 2G triggered mid-build LRU eviction. The entry uploaded to GHA is
# the compressed dir (smaller). GHA's 10 GiB/repo quota is a single shared pool
# across ALL cache entries, so total footprint = sum of every ccache key (one per
# host/target/build-type/variant on the shared scope, since PRs are read-only)
# plus qt/cpm entries — keep that sum under 10 GiB.
max_size = 5G

# Compression level (1-19, higher = smaller but slower)
compression_level = 5

# Hash the compiler binary contents rather than mtime. Lets cache hits survive
# compiler reinstalls that don't change the version (distro updates, CI image
# rebuilds). Small per-build overhead; offset by fewer unnecessary misses.
compiler_check = content

# Use the compiler's .d dependency output instead of re-running the preprocessor
# on a cache hit. Requires cmake/ninja (which emit -MD -MF as standard) and
# relies on time_macros + pch_defines sloppiness to stay correct.
# MSVC is supported transparently since ccache 4.6: /showIncludes is added
# automatically if the user doesn't specify it.
depend_mode = true

# Allow ccache to work with precompiled headers, time-based macros, and locale
# differences between dev machines and CI.
sloppiness = pch_defines,time_macros,include_file_mtime,include_file_ctime,locale

file_clone = true

# Defense-in-depth for localized MSVC installs: pin the /showIncludes prefix
# ccache parses so depend mode doesn't silently fall back to preprocessor mode
# on a non-English Windows runner.
msvc_dep_prefix = Note: including file:

# Useful for debugging cache misses (uncomment to enable)
# log_file = /tmp/ccache.log
